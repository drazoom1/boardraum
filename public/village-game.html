<!DOCTYPE html>
<html lang="ko">
<head>

<!-- Graphics: "Sprout Lands" by Cup Nooble (구매 라이선스) + LimeZu Modern Exteriors 일부 -->
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; background:#7fccc8; font-family:'Pretendard',-apple-system,sans-serif; overflow:hidden; touch-action:none; }
  #wrap { position:fixed; inset:0; }
  canvas#cv { image-rendering:pixelated; width:100%; height:100%; display:block; }
  #chatBar { position:fixed; bottom:14px; left:50%; transform:translateX(-50%); display:none; gap:6px; z-index:7; width:min(420px,80vw); }
  #chatBar input { flex:1; border:2px solid rgba(0,0,0,.3); border-radius:12px; padding:10px 14px; font-size:14px; outline:none; }
  #chatBar button { border:none; background:#111; color:#fff; border-radius:12px; padding:0 16px; font-weight:800; cursor:pointer; }
  #chatLog { position:fixed; left:12px; bottom:14px; z-index:6; display:flex; flex-direction:column; gap:3px; pointer-events:none; max-width:44vw; }
  #chatLog div { background:rgba(0,0,0,.45); color:#fff; font-size:12px; padding:4px 10px; border-radius:10px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #btnChat { position:fixed; right:18px; bottom:118px; width:52px; height:52px; border-radius:50%; font-size:20px; background:rgba(255,255,255,.22); border:1.5px solid rgba(255,255,255,.4); z-index:6; display:none; }
  @media (hover:none) { #btnChat { display:block; } }
  #hud { position:fixed; top:10px; left:10px; display:flex; gap:8px; align-items:center; z-index:5; }
  .chip { background:rgba(0,0,0,.55); color:#fff; padding:6px 12px; border-radius:20px; font-size:14px; font-weight:700; border:none; cursor:pointer; }
  a.chip { text-decoration:none; }
  #topRight { position:fixed; top:10px; right:10px; z-index:5; display:flex; gap:8px; }
  #hint { position:fixed; bottom:110px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,.65); color:#fff; padding:8px 16px; border-radius:12px; font-size:14px; display:none; z-index:5; }
  #dpad { position:fixed; left:14px; bottom:14px; display:grid; grid-template:repeat(3,52px)/repeat(3,52px); gap:2px; z-index:6; opacity:.85; }
  #dpad button, #btnE { background:rgba(255,255,255,.18); border:1.5px solid rgba(255,255,255,.35); color:#fff; border-radius:12px; font-size:20px; font-weight:800; -webkit-user-select:none; user-select:none; }
  #btnE { position:fixed; right:18px; bottom:34px; width:72px; height:72px; border-radius:50%; font-size:22px; background:rgba(255,210,80,.25); border-color:rgba(255,210,80,.6); z-index:6; }
  #creator { position:fixed; inset:0; background:rgba(12,20,14,.88); display:none; align-items:center; justify-content:center; z-index:10; }
  #creator .card { background:#fff; border-radius:20px; padding:24px; width:360px; text-align:center; }
  #creator h1 { font-size:20px; margin-bottom:4px; }
  #creator p { font-size:13px; color:#888; margin-bottom:12px; }
  #creator input { width:100%; border:1.5px solid #ddd; border-radius:10px; padding:10px; font-size:15px; text-align:center; margin-bottom:12px; }
  .swlabel { font-size:12px; color:#666; font-weight:700; margin-bottom:6px; }
  #charGrid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:4px; }
  #charGrid .cbtn { border:2.5px solid #eee; border-radius:12px; padding:6px 0 2px; cursor:pointer; background:#fafafa; }
  #charGrid .cbtn.sel { border-color:#111; background:#fff6e0; }
  #charGrid canvas { image-rendering:pixelated; }
  #creator button.go { margin-top:12px; width:100%; background:#111; color:#fff; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:800; cursor:pointer; }
  #loading { position:fixed; inset:0; background:#2a3b2e; color:#fff; display:flex; align-items:center; justify-content:center; z-index:20; font-weight:800; }
  .modal { position:fixed; inset:0; background:rgba(12,20,14,.8); display:none; align-items:center; justify-content:center; z-index:11; }
  .modal .mcard { background:#fff; border-radius:20px; width:min(560px,92vw); max-height:82vh; display:flex; flex-direction:column; overflow:hidden; }
  .modal .mhead { display:flex; align-items:center; padding:16px 20px 12px; border-bottom:1px solid #eee; }
  .modal .mhead h2 { font-size:17px; flex:1; }
  .modal .mhead button { border:none; background:#f2f2f2; width:32px; height:32px; border-radius:50%; font-size:16px; cursor:pointer; }
  .modal .mbody { overflow-y:auto; padding:16px 20px 20px; }
  #colGrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:12px; }
  #colGrid .gi img, #colGrid .gi .ph { width:100%; aspect-ratio:3/4; object-fit:cover; border-radius:10px; background:#eee; display:flex; align-items:center; justify-content:center; font-weight:800; color:#fff; font-size:12px; text-align:center; padding:4px; }
  #colGrid .gi p { font-size:11px; font-weight:700; color:#444; margin-top:4px; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .newsItem { display:block; padding:12px 14px; border:1.5px solid #eee; border-radius:12px; margin-bottom:8px; text-decoration:none; color:#222; }
  .newsItem:hover { background:#f8f8f8; }
  .newsItem b { display:block; font-size:14px; margin-bottom:2px; }
  .newsItem span { font-size:12px; color:#999; }
  #edPanel { position:fixed; right:10px; top:56px; width:230px; max-height:80vh; background:rgba(20,28,24,.92); border-radius:14px; padding:12px; z-index:8; display:none; flex-direction:column; gap:8px; color:#fff; overflow-y:auto; }
  #edPanel .edh { font-weight:800; font-size:14px; }
  #edPanel .edh2 { font-weight:700; font-size:12px; color:#bbb; }
  #edPanel .edrow { display:flex; flex-wrap:wrap; gap:5px; }
  .edt { background:rgba(255,255,255,.12); border:1.5px solid transparent; color:#fff; border-radius:8px; padding:5px 8px; font-size:12px; font-weight:700; cursor:pointer; }
  .edt.sel { border-color:#f4d35e; background:rgba(244,211,94,.2); }
  #decoWalls .edt, #decoTools .edt { background:#f0f0f0; color:#444; }
  #decoWalls .edt.sel, #decoFloors .edt.sel, #decoTools .edt.sel { border-color:#e0a13f; background:#fff3d6; color:#5c3f22; }
  #decoFloors .edt { color:#5c3f22; background:#f0f0f0; }
  .eds { background:rgba(120,180,255,.15); border:1.5px solid transparent; color:#fff; border-radius:8px; padding:5px 8px; font-size:12px; font-weight:700; cursor:pointer; }
  .eds.sel { border-color:#7fc4ff; }
  #edProps { display:grid; grid-template-columns:repeat(5,1fr); gap:4px; }
  .edp { background:rgba(255,255,255,.1); border:1.5px solid transparent; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .edp.sel { border-color:#f4d35e; }
  .edbtn { flex:1; background:#2d7a4f; border:none; color:#fff; border-radius:8px; padding:8px; font-weight:800; cursor:pointer; }
  @media (hover:hover) and (pointer:fine) { #dpad,#btnE { display:none; } }
</style>

  <div class="edrow">
    <button class="eds" data-k="home">🏡 내집</button><button class="eds" data-k="hall">🎲 광장</button>
    <button class="eds" data-k="lib">📚 도서관</button><button class="eds" data-k="mkt">🛒 마켓</button>

</div>

<div id="creator">
  <div class="card">
    <h1>🎨 내 캐릭터</h1>
    <p>캐릭터와 닉네임을 골라주세요.</p>
    <input id="nm" placeholder="닉네임" maxlength="8" value="여행자">

</div>
<div id="colModal" class="modal">

    <div class="mhead"><h2 id="colTitle">🎲 내 컬렉션</h2><button onclick="document.getElementById('colModal').style.display='none'">✕</button></div>
    <div class="mbody"><div id="colGrid"></div></div>
  </div>
</div>
<div id="newsModal" class="modal">
  <div class="mcard">
    <div class="mhead"><h2 id="newsTitle">📢 소식</h2><button onclick="document.getElementById('newsModal').style.display='none'">✕</button></div>
    <div class="mbody" id="newsBody">불러오는 중...</div>
  </div>
</div>
<div id="loading">🌱 보드마을 불러오는 중...</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const TILE=32; let VW=960, VH=704;
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
function fitCanvas(){ VW=Math.min(window.innerWidth,1600); VH=Math.min(window.innerHeight,1000); cv.width=VW; cv.height=VH; ctx.imageSmoothingEnabled=false; }
fitCanvas(); addEventListener('resize',fitCanvas);
const SB='https://wwpvntmueafieessgnbu.supabase.co/functions/v1/make-server-0b7d3bae';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3cHZudG11ZWFmaWVlc3NnbmJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ3MDczMjUsImV4cCI6MjA3MDI4MzMyNX0.KG4yuo02jACcVOlG7av3bMFmRcfHK6lzu0x78RMhz0c';

const store={ get:(k,d)=>{try{const v=localStorage.getItem('village_'+k);return v?JSON.parse(v):d}catch{return d}}, set:(k,v)=>{try{localStorage.setItem('village_'+k,JSON.stringify(v))}catch{}} };
let points=store.get('points',0);
document.getElementById('pts').textContent=points;

// ── 에셋 ──
const LZCH=['lz1','lz2','lz3','lz4','lz5','lz6','lz7','lz8','lz9'];
const ME=['grass1','grass2','tuft1','tuft2','tuft3','tuft4','tuft5','dirtauto','dirt_fp1','dirt_fp2',
  'waterauto','water2','lily1','lily2','tent_blue','tentS_blue','tentS_green','sign_camping','signboard2','billboard',
  'store_blue','store_pink','stadium','camper','fire1','fire2','btable','lamp','fount1','fount2',
  'fbush1','fbush2','fbush3','lantern','ball1','picnic','tree1','tree2','tree4',...LZCH];
const ME2=['lz_bench1','lz_bench2','lz_bench3','lz_trash','lz_hydrant','lz_angel','lz_statue','lz_busstop',
 'lz_foodcart1','lz_foodcart2','lz_umbrB','lz_umbrG','lz_barrel1','lz_barrel2','lz_crate1','lz_crate2',
 'lz_lantern','lz_pot1','lz_pot2','lz_bartable','lz_fountain','lz_lamp1','lz_lamp2','lz_lamp3','lz_fire','lz_btable2'];
const IMGS={};
const toLoad=[...ME.map(k=>'me/'+k),...ME2.map(k=>'me2/'+k),'coin'];
let loadedN=0;
toLoad.forEach(k=>{ const im=new Image(); im.src='village-assets/'+k+'.png';
  const key=k.replace('sl/','').replace('me2/','').replace('me/','').replace('eg/','');
  im.onload=()=>{ IMGS[key]=im; if(++loadedN>=toLoad.length) init(); };
  im.onerror=()=>{ console.warn('load fail',k); if(++loadedN>=toLoad.length) init(); }; });

let me=store.get('me',null);
if(me && !(typeof me.char==='string' && /^lz[1-9]$/.test(me.char))) me=null;
let charSel='lz1';

// ── 캐릭터 드로잉 (LimeZu 스트립: row0=idle, row1=walk, 방향 right/up/left/down) ──
const DIRO={right:0,up:6,left:12,down:18};
function drawChar(key,X,Y,dir,moving,t){
  if(!key||!/^lz[1-9]$/.test(key)) key='lz1';
  const img=IMGS[key]; if(!img) return;
  ctx.fillStyle='rgba(0,0,0,.25)'; ctx.beginPath(); ctx.ellipse(X,Y+1,11,3.6,0,0,7); ctx.fill();
  const row=moving?32:0;
  const f=moving?Math.floor(t/110)%6:Math.floor(t/260)%6;
  ctx.drawImage(img,(DIRO[dir]+f)*16,row,16,32, X-16, Y-64, 32,64);
}
function charPreview(g,key){
  const img=IMGS[key]; if(!img) return;
  g.drawImage(img,DIRO.down*16,0,16,32,8,2,32,56);
}
function tagTopOf(key){ return 66; }
// ═══════════ 유틸 ═══════════
const rng=(x,y)=>{ let h=(x*374761393+y*668265263)^(x*y*1274126177); h=(h^(h>>13))*1103515245; return (h^(h>>16))>>>0; };
function newGrid(cols,rows,v){ const g=[]; for(let y=0;y<rows;y++){ g[y]=[]; for(let x=0;x<cols;x++) g[y][x]=v; } return g; }
const setRect=(arr,x,y,w,h,v)=>{ for(let j=y;j<y+h;j++) for(let i=x;i<x+w;i++){ if(arr[j]&&arr[j][i]!==undefined) arr[j][i]=v; } };
function T(c,img,tx,ty,X,Y){ if(img) c.drawImage(img,tx*16,ty*16,16,16,X,Y,TILE,TILE); }
function soilPiece(map,cols,rows,x,y){
  const is=(dx,dy)=>{ const ty=y+dy,tx=x+dx; return ty>=0&&ty<rows&&tx>=0&&tx<cols&&map[ty][tx]===1; };
  const n=is(0,-1),s=is(0,1),e=is(1,0),w=is(-1,0);
  return [!w?0:(!e?3:((x%2)?1:2)), !n?0:(!s?3:((y%2)?1:2))];
}
function makeIsland(cols,rows,exits,map,seed,patches){
  const m=newGrid(cols,rows,false), prot=newGrid(cols,rows,false);
  const cx=cols/2, cy=rows/2, sd=seed||1;
  for(let y=1;y<rows-1;y++) for(let x=1;x<cols-1;x++){
    const nx=(x-cx)/(cols/2-1.2), ny=(y-cy)/(rows/2-1.2);
    const ang=Math.atan2(ny,nx);
    const wob=0.86+0.10*Math.sin(ang*2+sd*2.1)+0.06*Math.sin(ang*3+sd*4.7);
    if(nx*nx+ny*ny<=wob*wob) m[y][x]=true;
  }
  const mark=(x,y)=>{ if(y>0&&y<rows-1&&x>0&&x<cols-1){ m[y][x]=true; prot[y][x]=true; } };
  (patches||[]).forEach(([px,py,pw,ph])=>{ for(let y=py;y<py+ph;y++) for(let x=px;x<px+pw;x++) mark(x,y); });
  if(map) for(let y=0;y<rows;y++) for(let x=0;x<cols;x++) if(map[y][x]!==0)
    for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++) mark(x+dx,y+dy);
  (exits||[]).forEach(ex=>{
    for(let x=ex.x1;x<=ex.x2;x++){
      if(ex.side==='bottom'){ for(let y=Math.floor(rows*0.6);y<rows;y++){ m[y]&&(m[y][x]=true); prot[y]&&(prot[y][x]=true); } }
      else { for(let y=0;y<Math.ceil(rows*0.4);y++){ m[y]&&(m[y][x]=true); prot[y]&&(prot[y][x]=true); } }
    }
  });
  // 스무딩 2회: 8이웃 기준 (보호칸은 항상 육지)
  for(let it=0;it<2;it++){
    const n2=newGrid(cols,rows,false);
    for(let y=1;y<rows-1;y++) for(let x=1;x<cols-1;x++){
      if(prot[y][x]){ n2[y][x]=true; continue; }
      let cnt=0;
      for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){ if(dx||dy){ if(m[y+dy][x+dx]) cnt++; } }
      n2[y][x]= m[y][x] ? cnt>=4 : cnt>=6;
    }
    for(let y=0;y<rows;y++) for(let x=0;x<cols;x++) m[y][x]=n2[y][x];
  }
  (exits||[]).forEach(ex=>{ // 스무딩 후 출구 재보장
    for(let x=ex.x1;x<=ex.x2;x++){
      if(ex.side==='bottom'){ for(let y=Math.floor(rows*0.6);y<rows;y++) m[y][x]=true; }
      else { for(let y=0;y<Math.ceil(rows*0.4);y++) m[y][x]=true; }
    }
  });
  return m;
}
function bakeGround(c,map,cols,rows,island){
  const isl=(x,y)=>!island || (y>=0&&y<rows&&x>=0&&x<cols&&island[y][x]);
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++){
    if(island && !island[y][x]) continue;
    const r=rng(x,y);
    T(c,IMGS[r%5===0?'grass2':'grass1'],0,0,x*TILE,y*TILE);
    if(island){
      const n=isl(x,y-1),s2=isl(x,y+1),e=isl(x+1,y),w=isl(x-1,y);
      if(!(n&&s2&&e&&w)){
        let ci=!w?0:(!e?2:1), ri=!n?0:(!s2?2:1);
        T(c,IMGS.waterauto,2-ci,2-ri,x*TILE,y*TILE); // 반전=섬 가장자리
      }
    }
    const interior=!island || (isl(x,y-1)&&isl(x,y+1)&&isl(x+1,y)&&isl(x-1,y));
    if(map[y][x]===0 && interior && r%8===0) T(c,IMGS['tuft'+(1+r%5)],0,0,x*TILE,y*TILE);
  }
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++){
    if(map[y][x]===1){ const [ci,ri]=soilPiece(map,cols,rows,x,y); T(c,IMGS.dirtauto,ci,ri,x*TILE,y*TILE);
      const r=rng(x*3,y*5); if(r%23===0) T(c,IMGS[r%2?'dirt_fp1':'dirt_fp2'],0,0,x*TILE,y*TILE); }
  }
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++) if(map[y][x]===2){
    const is2=(dx,dy)=>{ const ty=y+dy,tx=x+dx; return ty>=0&&ty<rows&&tx>=0&&tx<cols&&map[ty][tx]===2; };
    const n=is2(0,-1),s2=is2(0,1),e=is2(1,0),w=is2(-1,0);
    if(n&&s2&&e&&w) T(c,IMGS.water2,0,0,x*TILE,y*TILE);
    else { const ci=!w?0:(!e?2:1), ri=!n?0:(!s2?2:1); T(c,IMGS.waterauto,ci,ri,x*TILE,y*TILE); }
  }
}
function drawSprites(c,sp){
  sp.sort((a,b)=>a.base-b.base);
  sp.forEach(s=>{ const img=IMGS[s.key]; if(!img) return;
    if(s.shadow){ c.fillStyle='rgba(0,0,0,.15)'; c.beginPath();

function serializeData(d,cols,rows){
  return { land:d.land.map(r=>r.map(v=>v?1:0).join('')),
           ground:d.ground.map(r=>r.join('')),
           props:d.props, structs:d.structs };
}
function parseData(raw,cols,rows){
  try{
    const land=newGrid(cols,rows,false), ground=newGrid(cols,rows,0);
    for(let y=0;y<rows;y++) for(let x=0;x<cols;x++){
      land[y][x]=raw.land[y][x]==='1';
      ground[y][x]=parseInt(raw.ground[y][x])||0;
    }
    return { land, ground, props:(raw.props||[]).filter(p=>PROP_DEF[p.k]),
             structs:Array.isArray(raw.structs)?raw.structs:null };
  }catch{ return null; }
}

  const D=SCENE_DEF[name], cols=D.cols, rows=D.rows, w=cols*TILE, h=rows*TILE;
  let data=SCENE_DATA[name];
  if(!data){
    data = (WORLDMAPS[name] && parseData(WORLDMAPS[name],cols,rows)) || genDefault(name);
    SCENE_DATA[name]=data;
  }
  const {land,ground,props}=data;
  if(!data.structs){ data.structs=SCENE_DEF[name].structs.map(p=>({...p})); }
  // 안전보정: 출구·길·연못·고정구조물은 항상 육지
  D.exits.forEach(ex=>{ for(let x=ex.x1;x<=ex.x2;x++){
    if(ex.side==='bottom'){ for(let y=Math.floor(rows*0.6);y<rows;y++) land[y][x]=true; }
    else { for(let y=0;y<Math.ceil(rows*0.4);y++) land[y][x]=true; } } });
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++) if(ground[y][x]!==0)
    for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){ const ty=y+dy,tx=x+dx; if(land[ty]&&land[ty][tx]!==undefined) land[ty][tx]=true; }
  D.patches.forEach(([px,py,pw,ph])=>setRect(land,px,py,pw,ph,true));
  data.structs.forEach(st=>{ const [rw,rh]=STRUCT_SIZE[st.k]||[4,4]; setRect(land,st.x,st.y,rw,rh+1,true); });
  const solid=newGrid(cols,rows,false);
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++) solid[y][x]=!land[y][x];
  // 물칸(연못 내부)
  const waterInner=[];
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++) if(ground[y][x]===4){ solid[y][x]=true; }
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++) if(ground[y][x]===2){
    solid[y][x]=true;
    const g2=(tx,ty)=>ty>=0&&ty<rows&&tx>=0&&tx<cols&&ground[ty][tx]===2;
    if(g2(x-1,y)&&g2(x+1,y)&&g2(x,y-1)&&g2(x,y+1)) waterInner.push([x,y]);
  }

      festaSpawn={x:(sx+9)*TILE,y:(sy+rh+1)*TILE};

function edTile(e){
  const r=cv.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(cv.width/r.width)+cam.x;
  const my=(e.clientY-r.top)*(cv.height/r.height)+cam.y;
  return [Math.floor(mx/TILE), Math.floor(my/TILE)];

function edApply(e){

  const t=editor.tool;
  if(t==='land'){ d.land[ty][tx]=true; }
  else if(t==='sea'){ d.land[ty][tx]=false; d.ground[ty][tx]=0; }
  else if(t==='road'){ d.ground[ty][tx]=1; d.land[ty][tx]=true; }
  else if(t==='pond'){ d.ground[ty][tx]=2; d.land[ty][tx]=true; }
  else if(t==='grass'){ d.ground[ty][tx]=0; }
  else if(t==='prop'){ if(!editor.drag){ d.props.push({k:editor.key,x:tx,y:ty}); } }
  else if(t==='struct'){
    const ex=d.structs.find(x2=>x2.k===editor.key);
    if(ex){ ex.x=tx; ex.y=ty; } else d.structs.push({k:editor.key,x:tx,y:ty});
  }
  else if(t==='del'){
    let best=-1,bd=1e9;
    d.props.forEach((p,i)=>{ const dd=Math.hypot(p.x-tx,p.y-ty); if(dd<bd){bd=dd;best=i;} });
    let bestS=-1,bdS=1e9;
    d.structs.forEach((p,i)=>{ const dd=Math.hypot(p.x+2-tx,p.y+2-ty); if(dd<bdS){bdS=dd;bestS=i;} });
    if(bestS>=0&&bdS<2.5&&bdS<bd) d.structs.splice(bestS,1);
    else if(best>=0&&bd<1.6) d.props.splice(best,1);
  }
  buildScene(scene);
}

function paintFenceH(c,X,Y){ // 나무 울타리 (가로 1타일)
  c.fillStyle='#8a6a45'; c.fillRect(X,Y+10,TILE,5); c.fillRect(X,Y+20,TILE,5);
  c.fillStyle='#6e522f'; c.fillRect(X+3,Y+6,5,22); c.fillRect(X+TILE-9,Y+6,5,22);
  c.fillStyle='#9d7c52'; c.fillRect(X+3,Y+6,5,3); c.fillRect(X+TILE-9,Y+6,5,3);
}
function paintFenceV(c,X,Y){
  c.fillStyle='#6e522f'; c.fillRect(X+13,Y,6,TILE);
  c.fillStyle='#8a6a45'; c.fillRect(X+9,Y+8,14,4); c.fillRect(X+9,Y+22,14,4);
}
function drawBoothStruct(c,bx,by,co){
  const px=bx*TILE, py=by*TILE, bw=8*TILE, col=co.color;
  // 뒷줄: 울타리
  for(let i=0;i<8;i++) paintFenceH(c,px+i*TILE,py);
  // 카운터 테이블
  const tb=IMGS.btable;
  if(tb){ c.drawImage(tb,px+8,py+2.2*TILE,64,64); c.drawImage(tb,px+bw/2-32,py+2.2*TILE,64,64); c.drawImage(tb,px+bw-72,py+2.2*TILE,64,64); }
  // 파스텔 차양
  const ay=py+1.7*TILE;
  for(let i=0;i<bw/16;i++){
    c.fillStyle=i%2?col:'#f7f1e4'; c.globalAlpha=i%2?0.85:1; c.fillRect(px+i*16,ay,16,24); c.globalAlpha=1; }
  c.fillStyle='rgba(0,0,0,.10)'; c.fillRect(px,ay+18,bw,6);
  for(let i=0;i<bw/16;i++){ c.fillStyle=i%2?col:'#f7f1e4'; c.globalAlpha=i%2?0.85:1;
    c.beginPath(); c.arc(px+i*16+8,ay+24,8,0,Math.PI); c.fill(); c.globalAlpha=1; }
  // 간판
  c.font='bold 15px Pretendard,sans-serif';
  const lw=c.measureText(co.name).width;
  c.fillStyle='#5c3f22'; c.fillRect(px+bw/2-lw/2-14,py-42,lw+28,30);
  c.fillStyle='#f5e9d0'; c.fillRect(px+bw/2-lw/2-10,py-38,lw+20,22);
  c.fillStyle='#5c3f22'; c.textAlign='center'; c.fillText(co.name, px+bw/2, py-22);
}

  ctx.fillStyle=color||'#fff'; ctx.fillText(name,X,Y-top);
}
// ── 실시간 멀티(프레즌스+채팅) ──
let rt=null; const others={};
const myPid=(()=>{ let k=store.get('pid',null); if(!k){ k='p'+Math.random().toString(36).slice(2,10); store.set('pid',k); } return k; })();
function chatLog(name,text){
  const log=document.getElementById('chatLog');
  const d=document.createElement('div'); d.textContent=name+': '+text;
  log.appendChild(d);
  while(log.children.length>6) log.removeChild(log.firstChild);
  setTimeout(()=>{ if(d.parentNode) d.parentNode.removeChild(d); },12000);
}
function initRealtime(){
  try{
    if(!window.supabase) return;
    const cl=window.supabase.createClient('https://wwpvntmueafieessgnbu.supabase.co', ANON);
    rt=cl.channel('village-v1',{config:{presence:{key:myPid},broadcast:{self:false}}});
    rt.on('presence',{event:'sync'},()=>{
      const st=rt.presenceState();
      for(const k in others){ if(!st[k]) delete others[k]; }
      for(const k in st){ if(k===myPid) continue;
        const m=st[k][0]; if(!m) continue;
        const o=others[k]||(others[k]={dx:m.x,dy:m.y});
        Object.assign(o,m);
      }
    });
    rt.on('broadcast',{event:'chat'},({payload})=>{
      if(!payload||payload.key===myPid) return;
      chatLog(payload.name||'여행자',payload.text||'');
      const o=others[payload.key];
      if(o){ o.chatText=payload.text; o.chatUntil=performance.now()+4500; }
    });
    rt.subscribe((status)=>{ if(status==='SUBSCRIBED') trackNow(true); });
  }catch(e){ console.warn('realtime fail',e); }
}
let lastTrack=0, lastSig='';
function trackNow(force){
  if(!rt) return;
  const now=Date.now();
  if(!force && now-lastTrack<250) return;
  const st={x:Math.round(player.x),y:Math.round(player.y),dir:player.dir,moving:player.moving,char:me?me.char:'lz1',name:me?me.name:'여행자',scene};
  const sig=JSON.stringify(st);
  if(!force && sig===lastSig) return;
  lastTrack=now; lastSig=sig;
  try{ rt.track(st); }catch{}
}
function drawOthers(t,dt){
  const now=performance.now();
  Object.values(others).forEach(o=>{
    if(o.scene!==scene) return;
    if(o.dx===undefined){ o.dx=o.x; o.dy=o.y; }
    o.dx+=(o.x-o.dx)*Math.min(1,dt*10); o.dy+=(o.y-o.dy)*Math.min(1,dt*10);
    const moving=Math.hypot(o.x-o.dx,o.y-o.dy)>2||o.moving;
    drawChar(o.char||'lz1',o.dx,o.dy,o.dir||'down',moving,t);
    drawTag(o.name||'여행자',o.dx,o.dy,o.char||'lz1','#cfe8ff');
    if(o.chatUntil&&now<o.chatUntil){
      ctx.font='bold 13px Pretendard,sans-serif';
      const tw=Math.min(ctx.measureText(o.chatText).width,300);
      const bx=o.dx-tw/2-10, by=o.dy-tagTopOf(o.char)-46;
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.roundRect(bx,by,tw+20,24,8); ctx.fill();
      ctx.fillStyle='#222'; ctx.textAlign='left'; ctx.fillText(o.chatText,bx+10,by+17,300);
    }
  });
}
function openChat(){
  if(modalOpen()) return;
  const bar=document.getElementById('chatBar');
  bar.style.display='flex';
  document.getElementById('chatIn').focus();
}
function sendChat(){
  const inp=document.getElementById('chatIn');
  const text=(inp.value||'').trim();
  inp.value='';
  document.getElementById('chatBar').style.display='none';
  if(!text) return;
  const name=me?me.name:'여행자';
  chatLog(name,text);
  sayAt(player.x, player.y-tagTopOf(me?me.char:'lz1')-26, text, 4500);
  if(rt){ try{ rt.send({type:'broadcast',event:'chat',payload:{key:myPid,name,text}}); }catch{} }
}
let bubble=null;
function sayAt(x,y,t,ms=3400){ bubble={x,y,text:t, until:performance.now()+ms}; }
function say(t,ms=2600){ const k=me?me.char:'lz1'; sayAt(player.x,player.y-tagTopOf(k)-26,t,ms); }

let coins=[];
function loadCoins(){
  const s=SC[scene]; if(!s||!s.coins){ coins=[]; return; }
  coins=store.get(s.coins, s.coinPos.map(([x,y])=>({x,y,got:false})));
}
function saveCoins(){ const s=SC[scene]; if(s&&s.coins) store.set(s.coins,coins); store.set('points',points); document.getElementById('pts').textContent=points; }

function switchScene(name, px, py, dir){
  scene=name; player.x=px; player.y=py; player.dir=dir||'down'; bubble=null;
  document.getElementById('loc').textContent = SC[name].loc;
  loadCoins();
}

function nearPrompt(){
  const s=SC[scene]; if(!s) return null;
  for(const it of s.interact){ if(Math.hypot(player.x-it.x, player.y-it.y)<it.r) return it; }
  for(const n of s.npcs){ if(Math.hypot(player.x-n.x, player.y-n.y)<52) return {label:n.name+'와 대화',act:'talk',npc:n}; }
  return null;
}
function doAction(){
  if(modalOpen()) return;
  const p=nearPrompt(); if(!p) return;
  if(p.act==='festa'){ switchScene('festa',22*TILE,23*TILE,'up'); say('🎪 보드게임 페스타에 오신 걸 환영해요!'); }
  else if(p.act==='exitFesta'){ const fs2=SC.road.festaSpawn||{x:14*TILE,y:12.5*TILE}; switchScene('road',fs2.x,fs2.y,'down'); }
  else if(p.act==='board'){ openBoard(); }
  else if(p.act==='booth'){ festaReturn={x:p.x, y:p.y+20}; boothCo=p.co; buildBooth(p.co); switchScene('booth',15*TILE,16*TILE,'up'); }
  else if(p.act==='exitBooth'){ switchScene('festa',festaReturn.x,festaReturn.y,'down'); }
  else if(p.act==='collection'){ openCollection(); }
  else if(p.act==='news'){ openNews(p.co); }
  else if(p.act==='bubble'){ say(p.text); }
  else if(p.act==='talk'){ const n=p.npc; n.li=(n.li||0);
    const oy = 70;
    sayAt(n.x, n.y-oy, n.lines[n.li%n.lines.length]); n.li++; }
}

// ── 동적 요소 ──
const butterflies=[{x:320,y:230,p:0},{x:660,y:480,p:2}];
function drawSceneDyn(t,dt){
  const s=SC[scene];
  // 바다: 화면 전체(씬 밖 포함) — 정적 물타일 + 반짝임
  {
    const wt=IMGS.water2;
    const x0=Math.floor(cam.x/TILE)-1, x1=Math.ceil((cam.x+VW)/TILE)+1;
    const y0=Math.floor(cam.y/TILE)-1, y1=Math.ceil((cam.y+VH)/TILE)+1;
    for(let y=y0;y<=y1;y++) for(let x=x0;x<=x1;x++){
      const inScene=x>=0&&y>=0&&x<s.cols&&y<s.rows;
      const isLand=inScene&&(!s.island||s.island[y][x]);
      if(!isLand){
        if(wt) ctx.drawImage(wt,0,0,16,16,x*TILE,y*TILE,TILE,TILE);
        else { ctx.fillStyle='#5aa3d8'; ctx.fillRect(x*TILE,y*TILE,TILE,TILE); }
      }
    }
    for(let i=0;i<10;i++){ const rr=rng(i*13,Math.floor(t/650)+i*7);
      const sx=cam.x+(rr%VW), sy=cam.y+((rr>>5)%VH);
      const tx=Math.floor(sx/TILE), ty=Math.floor(sy/TILE);
      const land=tx>=0&&ty>=0&&tx<s.cols&&ty<s.rows&&(!s.island||s.island[ty][tx]);
      if(!land){ ctx.fillStyle='rgba(255,255,255,.55)'; ctx.fillRect(sx,sy,3,2); } }
  }
  ctx.drawImage(s.bake,0,0);
  // 연못 반짝임 + 모닥불/분수 애니
  if(s.waterInner&&s.waterInner.length){
    for(let i=0;i<3;i++){ const rr=rng(i*7,Math.floor(t/700)+i);
      const [wx,wy]=s.waterInner[rr%s.waterInner.length];
      ctx.fillStyle='rgba(255,255,255,.6)'; ctx.fillRect(wx*TILE+(rr%20),wy*TILE+((rr>>4)%20),3,2); }
  }
  (s.fires||[]).forEach(([fx,fy])=>{
    const img=(Math.floor(t/180)%2)?IMGS.fire1:IMGS.fire2;
    if(img) ctx.drawImage(img,fx,fy,img.width*2,img.height*2);
    const gl=0.06+Math.sin(t/150)*0.03;
    ctx.fillStyle=`rgba(255,160,60,${gl})`; ctx.beginPath(); ctx.arc(fx+16,fy+22,42,0,7); ctx.fill();
  });
  (s.founts||[]).forEach(([fx,fy])=>{
    const img=(Math.floor(t/450)%2)?IMGS.fount1:IMGS.fount2;
    if(img) ctx.drawImage(img,fx,fy,img.width*2,img.height*2);
  });
  // 코인
  coins.forEach(cn=>{ if(cn.got) return; const X=cn.x*TILE+16, Y=cn.y*TILE+14+Math.sin(t/300+cn.x)*3;
    ctx.fillStyle='rgba(0,0,0,.2)'; ctx.beginPath(); ctx.ellipse(X,cn.y*TILE+27,6,2,0,0,7); ctx.fill();
    if(IMGS.coin) ctx.drawImage(IMGS.coin,X-7,Y-7,14,14); });
  // 동물
  // NPC
  s.npcs.forEach(n=>{
    drawChar(n.img,n.x,n.y,n.dir||'down',!!n.moving,t+(n.x*7));
    if(!n.hideTag) drawTag(n.name,n.x,n.y,n.img,'#ffe9a8');
  });
  drawOthers(t,dt);
  if(scene==='camp'||scene==='road'){
    butterflies.forEach(bf=>{ bf.p+=dt;
      const bx=bf.x+Math.sin(bf.p*0.7)*60+Math.sin(bf.p*2.3)*14, by=bf.y+Math.cos(bf.p*0.9)*40;
      const wing=Math.sin(bf.p*18)*3;
      ctx.fillStyle='#fff'; ctx.fillRect(bx-3-wing,by-2,3+wing,4); ctx.fillRect(bx+1,by-2,3+wing,4);
      ctx.fillStyle='#f4d35e'; ctx.fillRect(bx-2-wing,by-1,2,2); ctx.fillRect(bx+2,by-1,2,2);
      ctx.fillStyle='#2b2019'; ctx.fillRect(bx-0.5,by-2.5,1.5,5); });
    const cs=(t/40)%1400-200;
    ctx.fillStyle='rgba(25,50,30,.10)';
    ctx.beginPath(); ctx.ellipse(cs,180,130,45,0,0,7); ctx.ellipse(cs+90,210,90,35,0,0,7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(1100-cs*0.7,520,110,40,0,0,7); ctx.fill();
  }
}

// ── 충돌/루프 ──
function isSolid(x,y){
  const s=SC[scene];
  const tx=Math.floor(x/TILE), ty=Math.floor(y/TILE);
  if(tx<0||ty<0||tx>=s.cols||ty>=s.rows) return false;
  return s.solid[ty][tx];
}
let last=performance.now();
function loop(now){
  const dt=Math.min(50, now-last)/1000; last=now;
  let dx=0,dy=0;
  if(!modalOpen()&&!(editor.on&&editor.drag)){
    if(keys['ArrowLeft']||keys['a']) dx=-1; if(keys['ArrowRight']||keys['d']) dx=1;
    if(keys['ArrowUp']||keys['w']) dy=-1; if(keys['ArrowDown']||keys['s']) dy=1;
  }
  player.moving=!!(dx||dy);
  if(dx||dy){
    const sp=155*dt, nx=player.x+dx*sp, ny=player.y+dy*sp;
    if(!isSolid(nx-8,player.y)&&!isSolid(nx+8,player.y)) player.x=nx;
    if(!isSolid(player.x,ny-4)&&!isSolid(player.x,ny+8)) player.y=ny;
    player.dir=dy<0?'up':dy>0?'down':dx<0?'left':'right';
  }
  const sw=SC[scene].w, sh=SC[scene].h;
  if(scene==='camp' && player.y>sh-14 && player.x>13*TILE && player.x<17*TILE){ switchScene('road',27*TILE,1.6*TILE,'down'); }
  else if(scene==='road' && player.y<10 && player.x>25*TILE && player.x<29*TILE){ switchScene('camp',15*TILE,(SC.camp.rows-1.4)*TILE,'up'); }

  player.x=Math.max(12,Math.min(sw-12,player.x)); player.y=Math.max(2,Math.min(sh-4,player.y));
  coins.forEach(cn=>{ if(!cn.got && Math.hypot(cn.x*TILE+16-player.x, cn.y*TILE+16-player.y)<20){ cn.got=true; points+=10; saveCoins(); say('+10 포인트! 🪙',900); } });
  // 동물 배회
  const s0=SC[scene];
  trackNow();
  // 작가/NPC 배회
  const sN=SC[scene];
  if(sN&&sN.npcs) sN.npcs.forEach(n=>{
    if(!n.wander) return;
    n._t=(n._t||0)-dt;
    if(n._t<=0){ n._t=3+Math.random()*4;
      n._tx=n.wander.x1+Math.random()*(n.wander.x2-n.wander.x1);
      n._ty=n.wander.y1+Math.random()*(n.wander.y2-n.wander.y1); }
    if(n._tx!==undefined){
      const ddx=n._tx-n.x, ddy=n._ty-n.y;
      if(Math.hypot(ddx,ddy)>4){ n.x+=ddx*dt*0.5; n.y+=ddy*dt*0.5;
        n.dir=Math.abs(ddx)>Math.abs(ddy)?(ddx<0?'left':'right'):(ddy<0?'up':'down');
        n.moving=true; }
      else n.moving=false;
    }
  });
  cam.x = sw>VW ? Math.max(0,Math.min(sw-VW, player.x-VW/2)) : (sw-VW)/2;
  cam.y = sh>VH ? Math.max(0,Math.min(sh-VH, player.y-VH/2)) : (sh-VH)/2;

  ctx.clearRect(0,0,VW,VH);
  ctx.save(); ctx.translate(-cam.x,-cam.y);
  drawSceneDyn(now,dt);
  const myKey=me?me.char:'lz1';
  drawChar(myKey,player.x,player.y,player.dir,player.moving,now);
  drawTag(me?me.name:'여행자',player.x,player.y,myKey);
  if(bubble && now<bubble.until){
    ctx.font='bold 13px Pretendard,sans-serif';
    const tw=Math.min(ctx.measureText(bubble.text).width, 430);
    const bx=Math.max(cam.x+10,Math.min(cam.x+VW-tw-30,bubble.x-tw/2-10)), by=bubble.y-26;
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.roundRect(bx,by,tw+20,26,8); ctx.fill();
    ctx.beginPath(); ctx.moveTo(bubble.x-5,by+26); ctx.lineTo(bubble.x+5,by+26); ctx.lineTo(bubble.x,by+33); ctx.fill();
    ctx.fillStyle='#222'; ctx.textAlign='left'; ctx.fillText(bubble.text,bx+10,by+18,430);
  }
  ctx.restore();
  const p=modalOpen()?null:nearPrompt(); const hint=document.getElementById('hint');
  if(p){ hint.style.display='block'; hint.textContent='E — '+p.label; } else hint.style.display='none';
  requestAnimationFrame(loop);
}

// ── 초기화 ──
function makeCharCell(grid,key,labelText){
  const btn=document.createElement('div'); btn.className='cbtn'; btn.dataset.key=key;
  const cc=document.createElement('canvas'); cc.width=48; cc.height=58;
  btn.appendChild(cc);
  if(labelText){ const lb=document.createElement('div');
    lb.style.cssText='font-size:10px;font-weight:800;color:#b8860b;padding-bottom:2px'; lb.textContent=labelText; btn.appendChild(lb); }
  grid.appendChild(btn);
  const g=cc.getContext('2d'); g.imageSmoothingEnabled=false;
  charPreview(g,key);
  btn.onclick=()=>{ grid.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('sel')); btn.classList.add('sel'); charSel=key; };
  return btn;
}
function openCreator(){
  const c=document.getElementById('creator');
  document.getElementById('nm').value=me?me.name:'여행자';
  charSel=me?me.char:'lz1';
  c.querySelectorAll('.cbtn').forEach(b=>b.classList.toggle('sel',b.dataset.key===charSel));
  if(!c.querySelector('.sel')){ const f=c.querySelector('.cbtn'); if(f){ f.classList.add('sel'); charSel=f.dataset.key; } }
  c.style.display='flex';
}
async function init(){
  await loadWorldMaps();
  document.getElementById('loading').style.display='none';
  buildCamp(); buildRoad(); buildFesta();
  edInit();
  loadCoins();
  const grid=document.getElementById('charGrid');
  LZCH.forEach(k=>makeCharCell(grid,k));
  grid.querySelector('.cbtn').classList.add('sel');
  document.getElementById('go').onclick=()=>{
    me={ name:(document.getElementById('nm').value||'여행자').slice(0,8), char:charSel };
    store.set('me',me); document.getElementById('creator').style.display='none';
  };
  initRealtime();
  document.getElementById('chatSend').onclick=sendChat;
  document.getElementById('chatIn').addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); sendChat(); } if(e.key==='Escape'){ document.getElementById('chatBar').style.display='none'; e.target.blur(); } });
  document.getElementById('btnChat').addEventListener('click',openChat);
  if(!me) openCreator();
  requestAnimationFrame(loop);
}
// 디버그/테스트용 핸들 (프로토타입)
window.__v={ player, keys, doAction, switchScene, get scene(){return scene}, get points(){return points}, get cam(){return cam} };
</script>
