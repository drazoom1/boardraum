// ── 내 보드라움 등급 → 달걀 캐릭터 ──
const RANK_RAW=[[0,0,0,0],[80,3,10,1],[200,6,25,3],[400,10,50,6],[700,15,80,10],[1100,22,120,15],
 [1600,30,170,20],[2200,40,230,28],[2900,52,300,38],[3700,65,380,50],[4600,80,470,63],[5600,97,570,78],
 [6800,115,680,95],[8200,135,800,115],[9800,157,930,138],[11600,180,1080,163],[13600,206,1240,191],[15800,234,1410,222],
 [18300,265,1600,256],[21000,298,1800,293],[24000,334,2020,334],[27300,373,2260,379],[30900,415,2520,428],[34800,460,2800,481],
 [39200,510,3100,539],[43900,563,3420,602],[49000,620,3760,670],[54600,682,4120,744],[60600,748,4510,824],[67000,820,4920,910],
 [74000,898,5360,1003],[81500,982,5830,1103],[89500,1073,6330,1210],[98000,1171,6860,1325],[107000,1277,7420,1449],[116500,1391,8010,1582]];

let myRank=null;
async function fetchMyRank(){
  try{
    const raw=localStorage.getItem('supabase-auth-token'); if(!raw) return;
    let tok=null; try{ const s=JSON.parse(raw); tok=s.access_token||(s.currentSession&&s.currentSession.access_token); }catch{}
    if(!tok) return;
    const r=await fetch(SB+'/points/me',{headers:{'Authorization':'Bearer '+tok}});

    const d=await r.json();
    const st=[d.points||0,d.posts||0,d.comments||0,d.likesReceived||0];
    let idx=0;
    for(let i=0;i<RANK_RAW.length;i++){ const R=RANK_RAW[i];
      if(st[0]>=R[0]&&st[1]>=R[1]&&st[2]>=R[2]&&st[3]>=R[3]) idx=i; else break; }
    const tier=Math.floor(idx/6)+1;
    myRank={ tier, piece:EGG_PIECES[idx%6], label:TIER_KO[tier]+' '+(idx%6+1), key:'eg_t'+tier+'_'+EGG_PIECES[idx%6] };

}

// ── LimeZu 캐릭터 (row0=idle, row1=walk / 방향순서: right,up,left,down) ──
const DIRO={right:0,up:6,left:12,down:18};
function drawLZ(img,X,Y,dir,moving,t,s=2){
  if(!img) return;
  const row=moving?32:0;
  const f=moving?Math.floor(t/110)%6:Math.floor(t/260)%6;
  ctx.fillStyle='rgba(0,0,0,.25)'; ctx.beginPath(); ctx.ellipse(X,Y+1,11,3.6,0,0,7); ctx.fill();
  ctx.drawImage(img,(DIRO[dir]+f)*16,row,16,32, X-8*s, Y-32*s, 16*s, 32*s);
}

// ═══════════ 유틸 ═══════════
const rng=(x,y)=>{ let h=(x*374761393+y*668265263)^(x*y*1274126177); h=(h^(h>>13))*1103515245; return (h^(h>>16))>>>0; };
function newGrid(cols,rows,v){ const g=[]; for(let y=0;y<rows;y++){ g[y]=[]; for(let x=0;x<cols;x++) g[y][x]=v; } return g; }
const setRect=(arr,x,y,w,h,v)=>{ for(let j=y;j<y+h;j++) for(let i=x;i<x+w;i++){ if(arr[j]&&arr[j][i]!==undefined) arr[j][i]=v; } };
function T(c,img,tx,ty,X,Y){ if(img) c.drawImage(img,tx*16,ty*16,16,16,X,Y,TILE,TILE); }
function roadPiece(map,cols,rows,x,y){
  const is=(dx,dy)=>{ const ty=y+dy,tx=x+dx; return ty>=0&&ty<rows&&tx>=0&&tx<cols&&map[ty][tx]===1; };
  const n=is(0,-1),s=is(0,1),e=is(1,0),w=is(-1,0);
  return [!w?0:(!e?3:((x%2)?1:2)), !n?0:(!s?3:((y%2)?1:2))];
}
function bakeGround(c,map,cols,rows,pond){
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++){
    const r=rng(x,y);
    T(c,IMGS[r%3===0?'grass2':'grass1'],0,0,x*TILE,y*TILE);
    if(map[y][x]===0 && r%7===0) T(c,IMGS['tuft'+(1+r%5)],0,0,x*TILE,y*TILE);
  }
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++) if(map[y][x]===1){
    const [ci,ri]=roadPiece(map,cols,rows,x,y);
    T(c,IMGS.dirtauto,ci,ri,x*TILE,y*TILE);
    const r=rng(x*3,y*5);
    if(r%23===0) T(c,IMGS[r%2?'dirt_fp1':'dirt_fp2'],0,0,x*TILE,y*TILE);
  }
  if(pond) for(let y=pond.y;y<pond.y+pond.h;y++) for(let x=pond.x;x<pond.x+pond.w;x++){
    const cx=x===pond.x?0:(x===pond.x+pond.w-1?2:1);
    const cy=y===pond.y?0:(y===pond.y+pond.h-1?2:1);
    if(cx===1&&cy===1&&rng(x,y)%3===0) T(c,IMGS.water2,0,0,x*TILE,y*TILE);
    else T(c,IMGS.waterauto,cx,cy,x*TILE,y*TILE);
  }
}
function drawSprites(c,sp){
  sp.sort((a,b)=>a.base-b.base);
  sp.forEach(s=>{ const img=IMGS[s.key]; if(!img) return;
    if(s.shadow){ c.fillStyle='rgba(0,0,0,.18)'; c.beginPath();
      c.ellipse(s.px+img.width, s.base-4, img.width*0.9, 8, 0,0,7); c.fill(); }
    c.drawImage(img, s.px, s.py, img.width*2, img.height*2); });
}
function plaque(c,cx,cy,text,big=false){
  c.font=(big?'bold 15px':'bold 13px')+' Pretendard,sans-serif'; c.textAlign='center';
  const lw=c.measureText(text).width;
  c.fillStyle='#5c3f22'; c.fillRect(cx-lw/2-10,cy-16,lw+20,22);
  c.fillStyle='#f5e9d0'; c.fillRect(cx-lw/2-8,cy-14,lw+16,18);
  c.fillStyle='#5c3f22'; c.fillText(text,cx,cy);
}

// ---------- 캠핑존 (30x22) ----------
function buildCamp(){
  const cols=30, rows=22, w=cols*TILE, h=rows*TILE;
  const map=newGrid(cols,rows,0), solid=newGrid(cols,rows,false);
  setRect(map,2,11,26,3,1);
  setRect(map,14,2,2,9,1);
  setRect(map,14,14,2,8,1);
  const pond={x:23,y:15,w:5,h:5};
  setRect(map,pond.x,pond.y,pond.w,pond.h,2); setRect(solid,pond.x,pond.y,pond.w,pond.h,true);
  setRect(solid,0,0,cols,2,true);
  setRect(solid,0,rows-2,cols,2,true); setRect(solid,13,rows-2,4,2,false);
  setRect(solid,0,0,2,rows,true); setRect(solid,cols-2,0,2,rows,true);
  setRect(solid,3,6,6,4,true);
  setRect(solid,3,2,4,3,true);
  setRect(solid,9,2,2,2,true);
  setRect(solid,10,4,2,2,true);
  solid[9][12]=true;
  const TREES=[[11,3,'tree1'],[25,4,'tree4'],[26,13,'tree2'],[11,16,'tree1'],[20,14,'tree2']];
  TREES.forEach(([x,y])=>{ solid[y][x]=true; });
  const bake=document.createElement('canvas'); bake.width=w; bake.height=h;
  const c=bake.getContext('2d'); c.imageSmoothingEnabled=false;
  bakeGround(c,map,cols,rows,pond);
  const sp=[];
  const add=(key,px,py)=>{ const img=IMGS[key]; if(img) sp.push({key,px,py,base:py+img.height*2}); };
  for(let x=-1;x<cols;x+=2){ add(rng(x,0)%4===0?'tree2':'tree1', x*TILE, -70); }
  for(let x=-1;x<cols;x+=2){ if(x>=12&&x<=16) continue; add(rng(x,9)%5===0?'tree4':'tree1', x*TILE, h-100); }
  for(let y=1;y<rows-2;y+=2){ add(rng(0,y)%4===0?'tree2':'tree1', -40, y*TILE-40); add(rng(9,y)%4===0?'tree4':'tree1', w-88, y*TILE-40); }
  TREES.forEach(([x,y,k])=>add(k, x*TILE+16-64, y*TILE+32-120));

function drawBoothStruct(c,bx,by,co){

  c.fillStyle=col; c.fillRect(px,py,bw,2*TILE);
  c.fillStyle='rgba(255,255,255,.16)'; c.fillRect(px,py,bw,10);
  c.fillStyle='rgba(0,0,0,.14)'; c.fillRect(px,py+2*TILE-10,bw,10);
  // 포스터
  c.fillStyle='#fff'; c.fillRect(px+14,py+12,44,34);
  c.fillStyle=col; c.font='bold 20px Pretendard,sans-serif'; c.textAlign='center';
  c.fillText('🎲', px+36, py+37);
  c.fillStyle='#fff'; c.fillRect(px+bw-58,py+12,44,34);
  c.fillStyle=col; c.fillText('🃏', px+bw-36, py+37);
  // 사이드 기둥
  c.fillStyle='#7d5530'; c.fillRect(px-6,py-4,10,4.6*TILE); c.fillRect(px+bw-4,py-4,10,4.6*TILE);
  c.fillStyle='#8f6540'; c.fillRect(px-6,py-4,4,4.6*TILE); c.fillRect(px+bw-4,py-4,4,4.6*TILE);

  const tb=IMGS.btable;
  if(tb){ c.drawImage(tb,px+8,py+2.4*TILE,64,64); c.drawImage(tb,px+bw/2-32,py+2.4*TILE,64,64); c.drawImage(tb,px+bw-72,py+2.4*TILE,64,64); }
  // 차양 (스트라이프+스캘럽)
  const ay=py+2.1*TILE;
  for(let i=0;i<bw/16;i++){ c.fillStyle=i%2?col:'#f5efe2'; c.fillRect(px+i*16,ay,16,26); }
  c.fillStyle='rgba(0,0,0,.12)'; c.fillRect(px,ay+20,bw,6);

  // 간판 (기둥 위)
  c.font='bold 15px Pretendard,sans-serif';

  c.fillStyle='#5c3f22'; c.fillRect(px+bw/2-lw/2-14,py-40,lw+28,30);
  c.fillStyle='#f5e9d0'; c.fillRect(px+bw/2-lw/2-10,py-36,lw+20,22);
  c.fillStyle='#5c3f22'; c.textAlign='center'; c.fillText(co.name, px+bw/2, py-20);
}

    }
    const hits=newsCache.filter(p=>{ const s=(p.title||'')+(p.content||''); return co.kw.some(k=>s.includes(k)); }).slice(0,6);

function nearPrompt(){
  if(scene==='home'){

    if(player.y>=18*TILE) return {label:'마을로 나가기',act:'exitHome'};

  const s=SC[scene]; if(!s) return null;
  for(const it of s.interact){ if(Math.hypot(player.x-it.x, player.y-it.y)<it.r) return it; }
  for(const n of s.npcs){ if(Math.hypot(player.x-n.x, player.y-n.y)<52) return {label:n.name+'와 대화',act:'talk',npc:n}; }

function isSolid(x,y){
  if(scene==='home') return homeSolid(x,y);
  const s=SC[scene];
  const tx=Math.floor(x/TILE), ty=Math.floor(y/TILE);
  if(tx<0||ty<0||tx>=s.cols||ty>=s.rows) return false;
  return s.solid[ty][tx];
}
let last=performance.now();
function loop(now){
  const dt=Math.min(50, now-last)/1000; last=now;
  let dx=0,dy=0;
  if(!modalOpen()){
    if(keys['ArrowLeft']||keys['a']) dx=-1; if(keys['ArrowRight']||keys['d']) dx=1;
    if(keys['ArrowUp']||keys['w']) dy=-1; if(keys['ArrowDown']||keys['s']) dy=1;
  }
  player.moving=!!(dx||dy);
  if(dx||dy){
    const sp=155*dt, nx=player.x+dx*sp, ny=player.y+dy*sp;
    if(!isSolid(nx-8,player.y)&&!isSolid(nx+8,player.y)) player.x=nx;
    if(!isSolid(player.x,ny-4)&&!isSolid(player.x,ny+8)) player.y=ny;
    player.dir=dy<0?'up':dy>0?'down':dx<0?'left':'right';
  }
  const sw=scene==='home'?VW:SC[scene].w, sh=scene==='home'?VH:SC[scene].h;
  if(scene==='camp' && player.y>sh-14 && player.x>13*TILE && player.x<17*TILE){ switchScene('road',27*TILE,1.6*TILE,'down'); }
  else if(scene==='road' && player.y<10 && player.x>25*TILE && player.x<29*TILE){ switchScene('camp',15*TILE,(SC.camp.rows-1.4)*TILE,'up'); }
  player.x=Math.max(12,Math.min(sw-12,player.x)); player.y=Math.max(2,Math.min(sh-4,player.y));
  if(scene!=='home') coins.forEach(cn=>{ if(!cn.got && Math.hypot(cn.x*TILE+16-player.x, cn.y*TILE+16-player.y)<20){ cn.got=true; points+=10; saveCoins(); say('+10 포인트! 🪙',900); } });
  // 카메라
  cam.x=Math.max(0,Math.min(sw-VW, player.x-VW/2));
  cam.y=Math.max(0,Math.min(sh-VH, player.y-VH/2));

  ctx.clearRect(0,0,VW,VH);
  ctx.save(); ctx.translate(-cam.x,-cam.y);
  if(scene==='home') drawHome(now); else drawSceneDyn(now,dt);
  const myImg=IMGS[me?me.char:'lz1']||IMGS.lz1;
  drawLZ(myImg,player.x,player.y,player.dir,player.moving,now);
  if(me){ ctx.fillStyle='rgba(0,0,0,.5)'; ctx.font='bold 11px Pretendard,sans-serif'; ctx.textAlign='center';
    const tw=ctx.measureText(me.name).width; ctx.fillRect(player.x-tw/2-6,player.y-86,tw+12,16);
    ctx.fillStyle='#fff'; ctx.fillText(me.name,player.x,player.y-74); }
  if(bubble && now<bubble.until){
    ctx.font='bold 13px Pretendard,sans-serif';
    const tw=Math.min(ctx.measureText(bubble.text).width, 430);
    const bx=Math.max(cam.x+10,Math.min(cam.x+VW-tw-30,bubble.x-tw/2-10)), by=bubble.y-26;
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.roundRect(bx,by,tw+20,26,8); ctx.fill();
    ctx.beginPath(); ctx.moveTo(bubble.x-5,by+26); ctx.lineTo(bubble.x+5,by+26); ctx.lineTo(bubble.x,by+33); ctx.fill();
    ctx.fillStyle='#222'; ctx.textAlign='left'; ctx.fillText(bubble.text,bx+10,by+18,430);
  }
  ctx.restore();
  const p=modalOpen()?null:nearPrompt(); const hint=document.getElementById('hint');
  if(p){ hint.style.display='block'; hint.textContent='E — '+p.label; } else hint.style.display='none';
  requestAnimationFrame(loop);
}

function openCreator(){
  const c=document.getElementById('creator');
  document.getElementById('nm').value=me?me.name:'여행자';
  charSel=me?me.char:'lz1';
  c.querySelectorAll('.cbtn').forEach(b=>b.classList.toggle('sel',b.dataset.key===charSel));
  if(!c.querySelector('.sel')){ const f=c.querySelector('.cbtn'); if(f){ f.classList.add('sel'); charSel=f.dataset.key; } }
  c.style.display='flex';
}
function init(){
  document.getElementById('loading').style.display='none';
  buildCamp(); buildRoad(); buildFesta();
  loadCoins();
  const grid=document.getElementById('charGrid');
  for(let i=1;i<=NCHAR;i++) makeCharCell(grid,'lz'+i);
  grid.querySelector('.cbtn').classList.add('sel');
  document.getElementById('go').onclick=()=>{
    me={ name:(document.getElementById('nm').value||'여행자').slice(0,8), char:charSel };
    store.set('me',me); document.getElementById('creator').style.display='none';
  };
  fetchMyRank();
  if(!me) openCreator();
  requestAnimationFrame(loop);
}
// 디버그/테스트용 핸들 (프로토타입)
window.__v={ player, keys, doAction, switchScene, get scene(){return scene}, get points(){return points}, get cam(){return cam} };
