<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>보드마을 — 보드라움</title>
<!-- Graphics: "Modern Exteriors" by LimeZu (itch.io, 구매 라이선스) -->
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; background:#1d2b20; font-family:'Pretendard',-apple-system,sans-serif; overflow:hidden; touch-action:none; }
  #wrap { display:flex; align-items:center; justify-content:center; height:100%; }
  canvas#cv { image-rendering:pixelated; max-width:100vw; max-height:100vh; border-radius:6px; }
  #hud { position:fixed; top:10px; left:10px; display:flex; gap:8px; align-items:center; z-index:5; }
  .chip { background:rgba(0,0,0,.55); color:#fff; padding:6px 12px; border-radius:20px; font-size:14px; font-weight:700; }
  a.chip { text-decoration:none; }
  #homeLink { position:fixed; top:10px; right:10px; z-index:5; }
  #hint { position:fixed; bottom:110px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,.65); color:#fff; padding:8px 16px; border-radius:12px; font-size:14px; display:none; z-index:5; }
  #dpad { position:fixed; left:14px; bottom:14px; display:grid; grid-template:repeat(3,52px)/repeat(3,52px); gap:2px; z-index:6; opacity:.85; }
  #dpad button, #btnE { background:rgba(255,255,255,.18); border:1.5px solid rgba(255,255,255,.35); color:#fff; border-radius:12px; font-size:20px; font-weight:800; -webkit-user-select:none; user-select:none; }
  #btnE { position:fixed; right:18px; bottom:34px; width:72px; height:72px; border-radius:50%; font-size:22px; background:rgba(255,210,80,.25); border-color:rgba(255,210,80,.6); z-index:6; }
  #creator { position:fixed; inset:0; background:rgba(12,20,14,.88); display:flex; align-items:center; justify-content:center; z-index:10; }
  #creator .card { background:#fff; border-radius:20px; padding:24px; width:360px; text-align:center; }
  #creator h1 { font-size:20px; margin-bottom:4px; }
  #creator p { font-size:13px; color:#888; margin-bottom:12px; }
  #creator input { width:100%; border:1.5px solid #ddd; border-radius:10px; padding:10px; font-size:15px; text-align:center; margin-bottom:12px; }
  .swlabel { font-size:12px; color:#666; font-weight:700; margin-bottom:6px; }
  #charGrid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:4px; }
  #charGrid .cbtn { border:2.5px solid #eee; border-radius:12px; padding:6px 0 2px; cursor:pointer; background:#fafafa; }
  #charGrid .cbtn.sel { border-color:#111; background:#fff6e0; }
  #charGrid canvas { image-rendering:pixelated; }
  #creator button.go { margin-top:12px; width:100%; background:#111; color:#fff; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:800; cursor:pointer; }
  #loading { position:fixed; inset:0; background:#1d2b20; color:#fff; display:flex; align-items:center; justify-content:center; z-index:20; font-weight:800; }
  @media (hover:hover) and (pointer:fine) { #dpad,#btnE { display:none; } }
</style>
</head>
<body>
<div id="wrap"><canvas id="cv" width="960" height="704"></canvas></div>
<div id="hud">
  <span class="chip">🪙 <span id="pts">0</span></span>
  <span class="chip" id="loc">🏕️ 보드마을</span>
</div>
<a id="homeLink" class="chip" href="/">🏠 보드라움</a>
<div id="hint"></div>
<div id="dpad">
  <span></span><button data-k="ArrowUp">▲</button><span></span>
  <button data-k="ArrowLeft">◀</button><span></span><button data-k="ArrowRight">▶</button>
  <span></span><button data-k="ArrowDown">▼</button><span></span>
</div>
<button id="btnE">E</button>

<div id="creator" style="display:none">
  <div class="card">
    <h1>🏕️ 보드마을에 오신 걸 환영해요!</h1>
    <p>캐릭터를 고르고 마을을 돌아다녀 보세요.<br>남쪽 길로 내려가면 보드게임광장이 있어요!</p>
    <input id="nm" placeholder="닉네임" maxlength="8" value="여행자">
    <div class="swlabel">내 캐릭터</div>
    <div id="charGrid"></div>
    <button class="go" id="go">마을 입장 🎲</button>
  </div>
</div>
<div id="loading">🎲 보드마을 불러오는 중...</div>

<script>
const TILE=32, COLS=30, ROWS=22, W=COLS*TILE, H=ROWS*TILE;
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;

// ── 저장 ──
const store={ get:(k,d)=>{try{const v=localStorage.getItem('village_'+k);return v?JSON.parse(v):d}catch{return d}}, set:(k,v)=>{try{localStorage.setItem('village_'+k,JSON.stringify(v))}catch{}} };
let points=store.get('points',0);
document.getElementById('pts').textContent=points;

// ── 에셋 ──
const NCHAR=9; // lz1~lz9 (스카우트6+우체부3)
const ME=['grass1','grass2','tuft1','tuft2','tuft3','tuft4','tuft5','dirtauto','dirt_fp1','dirt_fp2',
  'waterauto','water2','lily1','lily2','tent_blue','tentS_green','tentS_blue','sign_camping','store_blue','store_pink',
  'signboard2','camper','fire1','fire2','btable','lamp','fount1','fount2','fbush1','fbush2','fbush3',
  'lantern','ball1','picnic','tree1','tree2','tree4','stadium'];
for(let i=1;i<=NCHAR;i++) ME.push('lz'+i);
const IMGS={};
const toLoad=[...ME.map(k=>'me/'+k),'coin'];
let loadedN=0;
toLoad.forEach(k=>{ const im=new Image(); im.src='village-assets/'+k+'.png';
  const key=k.replace('me/','');
  im.onload=()=>{ IMGS[key]=im; if(++loadedN>=toLoad.length) init(); };
  im.onerror=()=>{ console.warn('load fail',k); if(++loadedN>=toLoad.length) init(); }; });

let me=store.get('me',null);
if(me && !(typeof me.char==='string' && me.char.startsWith('lz'))) me=null; // 구버전 무시
let charSel=0;

// ── LimeZu 캐릭터 (스트립: row0=idle 6x4방향, row1=walk 6x4방향, 프레임 16x32) ──
const DIRO={down:0,up:6,left:12,right:18};
function drawLZ(img,X,Y,dir,moving,t,s=2){
  if(!img) return;
  const row=moving?32:0;
  const f=moving?Math.floor(t/110)%6:Math.floor(t/260)%6;
  ctx.fillStyle='rgba(0,0,0,.25)'; ctx.beginPath(); ctx.ellipse(X,Y+1,9*s/1.6,3*s/1.6,0,0,7); ctx.fill();
  ctx.drawImage(img,(DIRO[dir]+f)*16,row,16,32, X-8*s, Y-32*s, 16*s, 32*s);
}

// ═══════════ 씬 데이터 ═══════════
const rng=(x,y)=>{ let h=(x*374761393+y*668265263)^(x*y*1274126177); h=(h^(h>>13))*1103515245; return (h^(h>>16))>>>0; };
function newGrid(v){ const g=[]; for(let y=0;y<ROWS;y++){ g[y]=[]; for(let x=0;x<COLS;x++) g[y][x]=v; } return g; }
const setRect=(arr,x,y,w,h,v)=>{ for(let j=y;j<y+h;j++) for(let i=x;i<x+w;i++){ if(j>=0&&j<ROWS&&i>=0&&i<COLS) arr[j][i]=v; } };

const SC={}; // camp / road / festa
let scene='camp';

// ---------- 공용 베이크 헬퍼 ----------
function T(c,img,tx,ty,X,Y){ if(img) c.drawImage(img,tx*16,ty*16,16,16,X,Y,TILE,TILE); }
function roadPiece(map,x,y){
  const is=(dx,dy)=>{ const ty=y+dy,tx=x+dx; return ty>=0&&ty<ROWS&&tx>=0&&tx<COLS&&map[ty][tx]===1; };
  const n=is(0,-1),s=is(0,1),e=is(1,0),w=is(-1,0);
  return [!w?0:(!e?3:((x%2)?1:2)), !n?0:(!s?3:((y%2)?1:2))];
}
function bakeGround(c,map,pond){
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    const r=rng(x,y);
    T(c,IMGS[r%3===0?'grass2':'grass1'],0,0,x*TILE,y*TILE);
    if(map[y][x]===0 && r%7===0) T(c,IMGS['tuft'+(1+r%5)],0,0,x*TILE,y*TILE);
  }
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++) if(map[y][x]===1){
    const [ci,ri]=roadPiece(map,x,y);
    T(c,IMGS.dirtauto,ci,ri,x*TILE,y*TILE);
    const r=rng(x*3,y*5);
    if(r%23===0) T(c,IMGS[r%2?'dirt_fp1':'dirt_fp2'],0,0,x*TILE,y*TILE);
  }
  if(pond) for(let y=pond.y;y<pond.y+pond.h;y++) for(let x=pond.x;x<pond.x+pond.w;x++){
    const cx=x===pond.x?0:(x===pond.x+pond.w-1?2:1);
    const cy=y===pond.y?0:(y===pond.y+pond.h-1?2:1);
    if(cx===1&&cy===1&&rng(x,y)%3===0) T(c,IMGS.water2,0,0,x*TILE,y*TILE);
    else T(c,IMGS.waterauto,cx,cy,x*TILE,y*TILE);
  }
}
function drawSprites(c,sp){
  sp.sort((a,b)=>a.base-b.base);
  sp.forEach(s=>{ const img=IMGS[s.key]; if(!img) return;
    if(s.shadow){ c.fillStyle='rgba(0,0,0,.18)'; c.beginPath();
      c.ellipse(s.px+img.width, s.base-4, img.width*0.9, 8, 0,0,7); c.fill(); }
    c.drawImage(img, s.px, s.py, img.width*2, img.height*2); });
}
function plaque(c,cx,cy,text,big=false){
  c.font=(big?'bold 15px':'bold 13px')+' Pretendard,sans-serif'; c.textAlign='center';
  const lw=c.measureText(text).width;
  c.fillStyle='#5c3f22'; c.fillRect(cx-lw/2-10,cy-16,lw+20,22);
  c.fillStyle='#f5e9d0'; c.fillRect(cx-lw/2-8,cy-14,lw+16,18);
  c.fillStyle='#5c3f22'; c.fillText(text,cx,cy);
}

// ---------- 캠핑존 ----------
function buildCamp(){
  const map=newGrid(0), solid=newGrid(false);
  setRect(map,2,11,26,3,1);
  setRect(map,14,2,2,9,1);
  setRect(map,14,14,2,8,1); // 남쪽 출구까지
  const pond={x:23,y:15,w:5,h:5};
  setRect(map,pond.x,pond.y,pond.w,pond.h,2); setRect(solid,pond.x,pond.y,pond.w,pond.h,true);
  // 테두리 (남쪽 출구 gap: cols 13-16)
  setRect(solid,0,0,COLS,2,true);
  setRect(solid,0,ROWS-2,COLS,2,true); setRect(solid,13,ROWS-2,4,2,false);
  setRect(solid,0,0,2,ROWS,true); setRect(solid,COLS-2,0,2,ROWS,true);
  // 캠핑카 + 캠핑장
  setRect(solid,3,6,6,4,true);           // camper
  setRect(solid,3,2,4,3,true);           // tent
  setRect(solid,9,2,2,2,true);           // small tent
  setRect(solid,10,4,2,2,true);          // table
  solid[9][12]=true;                     // lamp
  const TREES=[[11,3,'tree1'],[25,4,'tree4'],[26,13,'tree2'],[11,16,'tree1'],[20,14,'tree2']];
  TREES.forEach(([x,y])=>{ solid[y][x]=true; });
  const bake=document.createElement('canvas'); bake.width=W; bake.height=H;
  const c=bake.getContext('2d'); c.imageSmoothingEnabled=false;
  bakeGround(c,map,pond);
  const sp=[];
  const add=(key,px,py)=>{ const img=IMGS[key]; if(img) sp.push({key,px,py,base:py+img.height*2}); };
  for(let x=-1;x<COLS;x+=2){ add(rng(x,0)%4===0?'tree2':'tree1', x*TILE, -70); }
  for(let x=-1;x<COLS;x+=2){ if(x>=12&&x<=16) continue; add(rng(x,9)%5===0?'tree4':'tree1', x*TILE, H-100); }
  for(let y=1;y<ROWS-2;y+=2){ add(rng(0,y)%4===0?'tree2':'tree1', -40, y*TILE-40); add(rng(9,y)%4===0?'tree4':'tree1', W-88, y*TILE-40); }
  TREES.forEach(([x,y,k])=>add(k, x*TILE+16-64, y*TILE+32-120));
  add('tent_blue', 3*TILE, 1*TILE);
  add('tentS_green', 9*TILE, 2*TILE);
  add('btable', 10*TILE, 4*TILE);
  add('lantern', 9.4*TILE, 7*TILE);
  add('sign_camping', 9*TILE, 9*TILE);
  add('picnic', 19*TILE, 17*TILE);
  add('ball1', 21.3*TILE, 18*TILE);
  add('fbush1', 17.5*TILE, 5.4*TILE);
  add('fbush2', 3*TILE, 12.2*TILE);
  add('fbush3', 24*TILE, 13.4*TILE);
  add('lamp', 12*TILE-16, 10*TILE-128);
  const camperImg=IMGS.camper;
  if(camperImg) sp.push({key:'camper', px:3*TILE, py:10*TILE-camperImg.height*2, base:10*TILE, shadow:true});
  drawSprites(c,sp);
  if(camperImg) plaque(c, 3*TILE+camperImg.width, 10*TILE-camperImg.height*2-12, '내 집');
  // 남쪽 출구 화살표
  c.fillStyle='rgba(0,0,0,.4)'; c.font='bold 13px Pretendard,sans-serif'; c.textAlign='center';
  c.fillText('⬇ 보드게임광장 가는 길', 15*TILE, (ROWS-2)*TILE-6);
  SC.camp={ map, solid, bake, pond,
    interact:[ {x:6*TILE,y:10.3*TILE,r:56,label:'내 집',act:'home'},
               {x:11.5*TILE,y:10*TILE,r:50,label:'캠핑 표지판',act:'bubble',text:'🏕️ 보드라움 캠핑장 — 남쪽 길로 가면 광장이에요!'} ],
    npcs:[],
    coins:'coins_camp_v1', coinPos:[[4,12],[9,12],[13,12],[18,12],[23,12],[14,4],[15,7],[14,16],[15,19]],
    fire:{x:10.3*TILE,y:6.8*TILE}, loc:'🏕️ 보드마을 캠핑존' };
}
// ---------- 광장 앞 길 ----------
const DESIGNERS=[
  { name:'우베 로젠버그', img:'lz7', x:18*TILE, y:16*TILE, dir:'down',
    lines:['아그리콜라, 카베르나… 농사 게임은 제 인생이죠 🌾','패치워크 한 판 어때요? 2인 게임의 정수랍니다','요즘도 새 퍼즐 게임을 스케치하고 있어요'] },
  { name:'라이너 크니치아', img:'lz8', x:24.5*TILE, y:9.5*TILE, dir:'down',
    lines:['수학자 출신이라 점수 계산엔 자신 있습니다 ✏️','모던아트, 티그리스… 경매 게임 좋아하세요?','게임의 재미는 규칙이 아니라 "결정"에 있어요'] },
  { name:'맷 리콕', img:'lz9', x:8*TILE, y:16.5*TILE? 16.5*TILE:0, dir:'down',
    lines:['팬데믹! 함께 이기고 함께 지는 게 진짜죠 🤝','금단의 섬은 가족과 하기 딱 좋아요','협력게임 디자인, 생각보다 훨씬 어렵답니다'] },
  { name:'볼프강 바르쉬', img:'lz4', x:2.5*TILE, y:10*TILE, dir:'right',
    lines:['콰크스의 돌팔이 약장수, 해보셨나요? 💊','간츠 쇤 클레버! 정말 영리하죠?','주사위 굴러가는 소리가 세상에서 제일 좋아요'] },
];
function buildRoad(){
  const map=newGrid(0), solid=newGrid(false);
  setRect(map,26,0,2,12,1);   // 북쪽 진입로(캠핑존에서)
  setRect(map,2,11,26,3,1);   // 광장 대로
  // 테두리 (북쪽 출구 gap: cols 25-28)
  setRect(solid,0,0,COLS,2,true); setRect(solid,25,0,4,2,false);
  setRect(solid,0,ROWS-2,COLS,2,true);
  setRect(solid,0,0,2,ROWS,true); setRect(solid,COLS-2,0,2,ROWS,true);
  // 경기장 / 상점 / 분수
  setRect(solid,5,1,18,11,true);   // stadium (rows 1-11)
  setRect(solid,3,14,5,5,true);    // 도서관
  setRect(solid,9,14,5,5,true);    // 마켓
  setRect(solid,23,15,2,2,true);   // 분수
  solid[15][16]=true;              // lamp
  const TREES=[[2,6,'tree1'],[2,17,'tree2'],[26,14,'tree1'],[27,17,'tree4'],[20,19,'tree2']];
  TREES.forEach(([x,y])=>{ solid[y][x]=true; });
  const bake=document.createElement('canvas'); bake.width=W; bake.height=H;
  const c=bake.getContext('2d'); c.imageSmoothingEnabled=false;
  bakeGround(c,map,null);
  const sp=[];
  const add=(key,px,py)=>{ const img=IMGS[key]; if(img) sp.push({key,px,py,base:py+img.height*2}); };
  for(let x=-1;x<COLS;x+=2){ if(x>=24&&x<=28) continue; add(rng(x,0)%4===0?'tree2':'tree1', x*TILE, -70); }
  for(let x=-1;x<COLS;x+=2){ add(rng(x,9)%5===0?'tree4':'tree1', x*TILE, H-100); }
  for(let y=1;y<ROWS-2;y+=2){ add(rng(0,y)%4===0?'tree2':'tree1', -40, y*TILE-40); add(rng(9,y)%4===0?'tree4':'tree1', W-88, y*TILE-40); }
  TREES.forEach(([x,y,k])=>add(k, x*TILE+16-64, y*TILE+32-120));
  add('fbush1', 1.2*TILE, 12.5*TILE);
  add('fbush2', 24*TILE, 12.4*TILE);
  add('fbush3', 8.2*TILE, 12.4*TILE);
  add('lamp', 16*TILE-16, 16*TILE-128);
  // 건물 스프라이트
  const stImg=IMGS.stadium;
  if(stImg) sp.push({key:'stadium', px:5*TILE, py:12*TILE-stImg.height*2, base:12*TILE, shadow:true});
  const lib=IMGS.store_blue, mkt=IMGS.store_pink;
  if(lib) sp.push({key:'store_blue', px:3*TILE, py:19*TILE-lib.height*2, base:19*TILE, shadow:true});
  if(mkt) sp.push({key:'store_pink', px:9*TILE, py:19*TILE-mkt.height*2, base:19*TILE, shadow:true});
  drawSprites(c,sp);
  if(stImg) plaque(c, 5*TILE+stImg.width, 12*TILE-stImg.height*2-10, '🎲 보드게임광장', true);
  if(lib) plaque(c, 3*TILE+lib.width, 19*TILE-lib.height*2-10, '보드위키 도서관');
  if(mkt) plaque(c, 9*TILE+mkt.width, 19*TILE-mkt.height*2-10, '보드마켓');
  c.fillStyle='rgba(0,0,0,.4)'; c.font='bold 13px Pretendard,sans-serif'; c.textAlign='center';
  c.fillText('⬆ 캠핑존', 27*TILE, 1.2*TILE);
  SC.road={ map, solid, bake, pond:null,
    interact:[ {x:14.2*TILE,y:12.3*TILE,r:60,label:'보드게임 페스타 입장',act:'festa'},
               {x:5.5*TILE,y:19.3*TILE,r:56,label:'보드위키 도서관',act:'bubble',text:'📚 보드위키로 연결 예정이에요!'},
               {x:11.5*TILE,y:19.3*TILE,r:56,label:'보드마켓',act:'bubble',text:'🚧 보드마켓 — 공사중! 곧 열려요'} ],
    npcs:DESIGNERS,
    coins:'coins_road_v1', coinPos:[[27,4],[26,8],[6,12],[12,13],[20,12],[25,13]],
    fount:{x:23,y:15}, loc:'🌲 광장 가는 길' };
}
// ---------- 페스타 (경기장 내부) ----------
const BOOTHS=[
  { name:'코리아보드게임즈', canopy:'tentS_blue',  x:4,  y:6,  text:'스플렌더 확장 2종, 7/6 출시! 실크로드 vs 저물지 않는 태양 🎉' },
  { name:'보드피아',        canopy:'tentS_green', x:13, y:6,  text:'덱커스 라이브룰스 업데이트! 1인 협력게임 좋아하세요? 🃏' },

function nearPrompt(){
  if(scene==='home'){
    const py=Math.floor(player.y/TILE);
    if(py>=18) return {label:'마을로 나가기',act:'exitHome'};
    if(py<=13) return {label:'책장 구경',act:'shelf'};
    return null;
  }
  const s=SC[scene]; if(!s) return null;
  for(const it of s.interact){ if(Math.hypot(player.x-it.x, player.y-it.y)<it.r) return it; }
  for(const n of s.npcs){ if(Math.hypot(player.x-n.x, player.y-n.y)<52) return {label:n.name+'와 대화',act:'talk',npc:n}; }
  return null;
}
function doAction(){
  const p=nearPrompt(); if(!p) return;
  if(p.act==='home'){ switchScene('home',480,612,'up'); say((me?me.name:'나')+'의 아늑한 캠핑카 🛋️'); }
  else if(p.act==='exitHome'){ switchScene('camp',6*TILE,10.8*TILE,'down'); }

}

function isSolid(x,y){
  const tx=Math.floor(x/TILE), ty=Math.floor(y/TILE);
  if(scene==='home'){ if(ty<13) return true; if(x>396&&x<564&&y>466&&y<566) return true; if(tx<0||ty<0||tx>=COLS||ty>=ROWS) return true; return false; }
  if(tx<0||ty<0||tx>=COLS||ty>=ROWS) return false; // 씬 전환용 가장자리 허용
  return SC[scene].solid[ty][tx];
}
let last=performance.now();
function loop(now){
  const dt=Math.min(50, now-last)/1000; last=now;
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a']) dx=-1; if(keys['ArrowRight']||keys['d']) dx=1;
  if(keys['ArrowUp']||keys['w']) dy=-1; if(keys['ArrowDown']||keys['s']) dy=1;
  player.moving=!!(dx||dy);
  if(dx||dy){
    const sp=155*dt, nx=player.x+dx*sp, ny=player.y+dy*sp;
    if(!isSolid(nx-8,player.y)&&!isSolid(nx+8,player.y)) player.x=nx;
    if(!isSolid(player.x,ny-4)&&!isSolid(player.x,ny+8)) player.y=ny;
    player.dir=dy<0?'up':dy>0?'down':dx<0?'left':'right';
  }
  // 씬 전환 (가장자리)
  if(scene==='camp' && player.y>H-14 && player.x>13*TILE && player.x<17*TILE){ switchScene('road',27*TILE,1.6*TILE,'down'); }
  else if(scene==='road' && player.y<10 && player.x>25*TILE && player.x<29*TILE){ switchScene('camp',15*TILE,(ROWS-1.4)*TILE,'up'); }
  player.x=Math.max(12,Math.min(W-12,player.x)); player.y=Math.max(2,Math.min(H-4,player.y));
  if(scene!=='home') coins.forEach(cn=>{ if(!cn.got && Math.hypot(cn.x*TILE+16-player.x, cn.y*TILE+16-player.y)<20){ cn.got=true; points+=10; saveCoins(); say('+10 포인트! 🪙',900); } });

  ctx.clearRect(0,0,W,H);
  if(scene==='home') drawHome(now); else drawSceneDyn(now,dt);
  const myImg=IMGS['lz'+(me?me.char.replace('lz',''):'1')]||IMGS.lz1;
  drawLZ(myImg,player.x,player.y,player.dir,player.moving,now);
  if(me){ ctx.fillStyle='rgba(0,0,0,.5)'; ctx.font='bold 11px Pretendard,sans-serif'; ctx.textAlign='center';
    const tw=ctx.measureText(me.name).width; ctx.fillRect(player.x-tw/2-6,player.y-86,tw+12,16);
    ctx.fillStyle='#fff'; ctx.fillText(me.name,player.x,player.y-74); }
  if(bubble && now<bubble.until){
    ctx.font='bold 13px Pretendard,sans-serif';
    const tw=Math.min(ctx.measureText(bubble.text).width, 420);
    const bx=Math.max(10,Math.min(W-tw-30,bubble.x-tw/2-10)), by=bubble.y-26;
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.roundRect(bx,by,tw+20,26,8); ctx.fill();
    ctx.beginPath(); ctx.moveTo(bubble.x-5,by+26); ctx.lineTo(bubble.x+5,by+26); ctx.lineTo(bubble.x,by+33); ctx.fill();
    ctx.fillStyle='#222'; ctx.textAlign='left'; ctx.fillText(bubble.text,bx+10,by+18,420);
  }
  const p=nearPrompt(); const hint=document.getElementById('hint');
  if(p){ hint.style.display='block'; hint.textContent='E — '+p.label; } else hint.style.display='none';
  requestAnimationFrame(loop);
}

// ── 초기화 ──
function init(){
  document.getElementById('loading').style.display='none';
  buildCamp(); buildRoad(); buildFesta();
  loadCoins();
  const grid=document.getElementById('charGrid');
  for(let i=1;i<=NCHAR;i++){
    const btn=document.createElement('div'); btn.className='cbtn'+(i===1?' sel':'');
    const cc=document.createElement('canvas'); cc.width=48; cc.height=58;
    btn.appendChild(cc); grid.appendChild(btn);
    const g=cc.getContext('2d'); g.imageSmoothingEnabled=false;
    const img=IMGS['lz'+i]; if(img) g.drawImage(img,0,0,16,32,8,2,32,56);
    ((idx)=>{ btn.onclick=()=>{ grid.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('sel')); btn.classList.add('sel'); charSel=idx; }; })(i);
  }
  charSel=1;
  document.getElementById('go').onclick=()=>{
    me={ name:(document.getElementById('nm').value||'여행자').slice(0,8), char:'lz'+charSel };
    store.set('me',me); document.getElementById('creator').style.display='none';
  };
  if(!me) document.getElementById('creator').style.display='flex';
  requestAnimationFrame(loop);
}
// 디버그/테스트용 핸들 (프로토타입)
window.__v={ player, keys, doAction, switchScene, get scene(){return scene}, get points(){return points} };
</script>
