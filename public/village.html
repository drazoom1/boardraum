<style>

  #dpad { position:fixed; left:14px; bottom:14px; display:grid; grid-template:repeat(3,52px)/repeat(3,52px); gap:2px; z-index:6; opacity:.85; }

  #creator { position:fixed; inset:0; background:rgba(12,20,14,.88); display:none; align-items:center; justify-content:center; z-index:10; }
  #creator .card { background:#fff; border-radius:20px; padding:24px; width:360px; text-align:center; }

  #creator p { font-size:13px; color:#888; margin-bottom:12px; }

  .swlabel { font-size:12px; color:#666; font-weight:700; margin-bottom:6px; }

  #charGrid .cbtn { border:2.5px solid #eee; border-radius:12px; padding:6px 0 2px; cursor:pointer; background:#fafafa; }
  #charGrid .cbtn.sel { border-color:#111; background:#fff6e0; }

  #creator button.go { margin-top:12px; width:100%; background:#111; color:#fff; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:800; cursor:pointer; }

  .modal .mcard { background:#fff; border-radius:20px; width:min(560px,92vw); max-height:82vh; display:flex; flex-direction:column; overflow:hidden; }

  #colGrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:12px; }
  #colGrid .gi img, #colGrid .gi .ph { width:100%; aspect-ratio:3/4; object-fit:cover; border-radius:10px; background:#eee; display:flex; align-items:center; justify-content:center; font-weight:800; color:#fff; font-size:12px; text-align:center; padding:4px; }
  #colGrid .gi p { font-size:11px; font-weight:700; color:#444; margin-top:4px; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const TILE=32; let VW=960, VH=704;
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
function fitCanvas(){ VW=Math.min(window.innerWidth,1600); VH=Math.min(window.innerHeight,1000); cv.width=VW; cv.height=VH; ctx.imageSmoothingEnabled=false; }
fitCanvas(); addEventListener('resize',fitCanvas);
const SB='https://wwpvntmueafieessgnbu.supabase.co/functions/v1/make-server-0b7d3bae';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3cHZudG11ZWFmaWVlc3NnbmJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ3MDczMjUsImV4cCI6MjA3MDI4MzMyNX0.KG4yuo02jACcVOlG7av3bMFmRcfHK6lzu0x78RMhz0c';

const store={ get:(k,d)=>{try{const v=localStorage.getItem('village_'+k);return v?JSON.parse(v):d}catch{return d}}, set:(k,v)=>{try{localStorage.setItem('village_'+k,JSON.stringify(v))}catch{}} };
let points=store.get('points',0);
document.getElementById('pts').textContent=points;

// ── 에셋 ──
const SLC=['cream','mint','sky','pink','lav','butter'];
const SL=['grass','grassauto','gdec1','gdec2','gdec3','gdec4','gdec5','gdec6','soilauto','wframes',
  'bedP','dresser','plantA','plantB','clock','rugT','rugP','frame1',
  'fenH_l','fenH_m','fenH_r','fenV_t','fenV_m','fenV_b','fenPost','wallL','wallM','wallR',
  'treeA','treeB','treeC','treeD','bigtree','bush1','bush2','stump','log',
  'flower1','flower2','flower3','flower4','mush1','mush2','mush3',
  'sign1','sign2','well','picnic','boat','chicken','cowrow','coop',
  'houseA','houseLib','houseMkt','hall',
  'wobj1','wobj2','wobj3','wobj4','wobj5','wobj6','sign3','sign4','signS1','signS2',
  'workst','basket','mailbox','chest','tray','boat2','bridge','stonetile','barn','coop2','coop3',
  'stump2','sapling','bedY','bedG','nstand','frame2','chairB2','clockB','rugS1','rugS2',
  ...Array.from({length:54},(_,i)=>'deco'+(i+1)),
  ...SLC.map(c=>'slc_'+c)];
const ME=['camper','btable','tentS_blue','tentS_green'];
const IMGS={};
const toLoad=[...SL.map(k=>'sl/'+k),...ME.map(k=>'me/'+k),'coin'];
let loadedN=0;
toLoad.forEach(k=>{ const im=new Image(); im.src='village-assets/'+k+'.png';
  const key=k.replace('sl/','').replace('me/','').replace('eg/','');
  im.onload=()=>{ IMGS[key]=im; if(++loadedN>=toLoad.length) init(); };
  im.onerror=()=>{ console.warn('load fail',k); if(++loadedN>=toLoad.length) init(); }; });

let me=store.get('me',null);
if(me && !(typeof me.char==='string' && me.char.startsWith('slc_'))) me=null;
let charSel='slc_cream';

// ── 캐릭터 드로잉 (두 포맷) ──
const DIRO={right:0,up:6,left:12,down:18};          // 달걀 (16x32 스트립)
const SLDIR={down:0,up:1,left:2,right:3};            // 스프라우트 (48x48, 행=방향)
function drawChar(key,X,Y,dir,moving,t){
  if(!key||!key.startsWith('slc_')) key='slc_cream';
  const img=IMGS[key]; if(!img) return;
  ctx.fillStyle='rgba(0,0,0,.22)'; ctx.beginPath(); ctx.ellipse(X,Y+1,12,3.8,0,0,7); ctx.fill();
  if(key.startsWith('slc_')){
    const f=moving?Math.floor(t/140)%4:0;
    ctx.drawImage(img,f*48,SLDIR[dir]*48,48,48, X-48, Y-64, 96,96); // 발끝(y32*2)=Y
  } else {
    const row=moving?32:0;
    const f=moving?Math.floor(t/110)%6:Math.floor(t/260)%6;
    ctx.drawImage(img,(DIRO[dir]+f)*16,row,16,32, X-16, Y-64, 32,64);
  }
}
function charPreview(g,key){
  const img=IMGS[key]; if(!img) return;
  g.drawImage(img,0,0,48,48,0,4,48,48);
}

// ═══════════ 유틸 ═══════════
const rng=(x,y)=>{ let h=(x*374761393+y*668265263)^(x*y*1274126177); h=(h^(h>>13))*1103515245; return (h^(h>>16))>>>0; };
function newGrid(cols,rows,v){ const g=[]; for(let y=0;y<rows;y++){ g[y]=[]; for(let x=0;x<cols;x++) g[y][x]=v; } return g; }
const setRect=(arr,x,y,w,h,v)=>{ for(let j=y;j<y+h;j++) for(let i=x;i<x+w;i++){ if(arr[j]&&arr[j][i]!==undefined) arr[j][i]=v; } };
function T(c,img,tx,ty,X,Y){ if(img) c.drawImage(img,tx*16,ty*16,16,16,X,Y,TILE,TILE); }
function soilPiece(map,cols,rows,x,y){
  const is=(dx,dy)=>{ const ty=y+dy,tx=x+dx; return ty>=0&&ty<rows&&tx>=0&&tx<cols&&map[ty][tx]===1; };
  const n=is(0,-1),s=is(0,1),e=is(1,0),w=is(-1,0);
  if(!n&&!s&&!e&&!w) return [3,3];
  if(!e&&!w) return [3, !n?0:(!s?2:1)];
  if(!n&&!s) return [!w?0:(!e?2:1), 3];
  return [!w?0:(!e?2:1), !n?0:(!s?2:1)];
}
// 섬 마스크: 유기적 블롭 + 스무딩(부드러운 해안) + 보호칸(길·연못·구조물·출구)
function makeIsland(cols,rows,exits,map,seed,patches){
  const m=newGrid(cols,rows,false), prot=newGrid(cols,rows,false);
  const cx=cols/2, cy=rows/2, sd=seed||1;
  for(let y=1;y<rows-1;y++) for(let x=1;x<cols-1;x++){
    const nx=(x-cx)/(cols/2-1.2), ny=(y-cy)/(rows/2-1.2);
    const ang=Math.atan2(ny,nx);
    const wob=0.86+0.10*Math.sin(ang*2+sd*2.1)+0.06*Math.sin(ang*3+sd*4.7);
    if(nx*nx+ny*ny<=wob*wob) m[y][x]=true;
  }
  const mark=(x,y)=>{ if(y>0&&y<rows-1&&x>0&&x<cols-1){ m[y][x]=true; prot[y][x]=true; } };
  (patches||[]).forEach(([px,py,pw,ph])=>{ for(let y=py;y<py+ph;y++) for(let x=px;x<px+pw;x++) mark(x,y); });
  if(map) for(let y=0;y<rows;y++) for(let x=0;x<cols;x++) if(map[y][x]!==0)
    for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++) mark(x+dx,y+dy);
  (exits||[]).forEach(ex=>{
    for(let x=ex.x1;x<=ex.x2;x++){
      if(ex.side==='bottom'){ for(let y=Math.floor(rows*0.6);y<rows;y++){ m[y]&&(m[y][x]=true); prot[y]&&(prot[y][x]=true); } }
      else { for(let y=0;y<Math.ceil(rows*0.4);y++){ m[y]&&(m[y][x]=true); prot[y]&&(prot[y][x]=true); } }
    }
  });
  // 스무딩 2회: 8이웃 5개 이상이 육지면 육지 (보호칸은 항상 육지)
  for(let it=0;it<2;it++){
    const n2=newGrid(cols,rows,false);
    for(let y=1;y<rows-1;y++) for(let x=1;x<cols-1;x++){
      if(prot[y][x]){ n2[y][x]=true; continue; }
      let cnt=0;
      for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){ if(dx||dy){ if(m[y+dy][x+dx]) cnt++; } }
      n2[y][x]= m[y][x] ? cnt>=4 : cnt>=6;
    }
    for(let y=0;y<rows;y++) for(let x=0;x<cols;x++) m[y][x]=n2[y][x];
  }
  (exits||[]).forEach(ex=>{ // 스무딩 후 출구 재보장
    for(let x=ex.x1;x<=ex.x2;x++){
      if(ex.side==='bottom'){ for(let y=Math.floor(rows*0.6);y<rows;y++) m[y][x]=true; }
      else { for(let y=0;y<Math.ceil(rows*0.4);y++) m[y][x]=true; }
    }
  });
  return m;
}
function bakeGround(c,map,cols,rows,island){
  const isl=(x,y)=>!island || (y>=0&&y<rows&&x>=0&&x<cols&&island[y][x]);
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++){
    if(island && !island[y][x]) continue; // 물 (dyn에서 애니)
    const r=rng(x,y);
    if(!island){ T(c,IMGS.grass,0,0,x*TILE,y*TILE); }
    else {
      const n=isl(x,y-1),s=isl(x,y+1),e=isl(x+1,y),w=isl(x-1,y);
      if(n&&s&&e&&w) T(c,IMGS.grass,0,0,x*TILE,y*TILE);
      else {
        let ci,ri;
        if(!e&&!w){ ci=3; ri=!n?0:(!s?2:1); }
        else if(!n&&!s){ ci=!w?0:(!e?2:1); ri=3; }
        else { ci=!w?0:(!e?2:1); ri=!n?0:(!s?2:1); }
        T(c,IMGS.grass,0,0,x*TILE,y*TILE); // 밑색
        T(c,IMGS.grassauto,ci,ri,x*TILE,y*TILE);
      }
    }
    const interior=!island || (isl(x,y-1)&&isl(x,y+1)&&isl(x+1,y)&&isl(x-1,y));
    if(map[y][x]===0 && interior){
      if(r%6===0) T(c,IMGS['gdec'+(1+r%6)],0,0,x*TILE,y*TILE);
      else if(r%31===0) T(c,IMGS['flower'+(1+r%4)],0,0,x*TILE,y*TILE);
      else if(r%53===0) T(c,IMGS['mush'+(1+r%3)],0,0,x*TILE,y*TILE);
    }
  }
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++){
    if(map[y][x]===1){ const [ci,ri]=soilPiece(map,cols,rows,x,y); T(c,IMGS.soilauto,ci,ri,x*TILE,y*TILE); }
    else if(map[y][x]===3){ T(c,IMGS.stonetile,0,0,x*TILE,y*TILE); }
  }
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++) if(map[y][x]===2){
    const is=(dx,dy)=>{ const ty=y+dy,tx=x+dx; return ty>=0&&ty<rows&&tx>=0&&tx<cols&&map[ty][tx]===2; };
    const n=is(0,-1),s=is(0,1),e=is(1,0),w=is(-1,0);
    const ci=!w?0:(!e?2:1), ri=!n?0:(!s?2:1);
    T(c,IMGS.soilauto,ci,ri,x*TILE,y*TILE);
  }
}

function parseData(raw,cols,rows){

      land[y][x]=raw.land[y][x]==='1';

    }

             structs:Array.isArray(raw.structs)?raw.structs:null };

const editor={ on:false, tool:'land', key:'treeA', drag:false };
function editorToggle(){

function edTile(e){
  const r=cv.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(cv.width/r.width)+cam.x;
  const my=(e.clientY-r.top)*(cv.height/r.height)+cam.y;
  return [Math.floor(mx/TILE), Math.floor(my/TILE)];
}
function edApply(e){
  if(!editor.on) return;
  if(scene!=='camp'&&scene!=='road') return;
  const d=SCENE_DATA[scene]; if(!d) return;
  const s0=SC[scene];
  const [tx,ty]=edTile(e);
  if(tx<0||ty<0||tx>=s0.cols||ty>=s0.rows) return;
  const t=editor.tool;
  if(t==='land'){ d.land[ty][tx]=true; }
  else if(t==='sea'){ d.land[ty][tx]=false; d.ground[ty][tx]=0; }
  else if(t==='road'){ d.ground[ty][tx]=1; d.land[ty][tx]=true; }
  else if(t==='stone'){ d.ground[ty][tx]=3; d.land[ty][tx]=true; }
  else if(t==='pond'){ d.ground[ty][tx]=2; d.land[ty][tx]=true; }
  else if(t==='grass'){ d.ground[ty][tx]=0; }
  else if(t==='prop'){ if(!editor.drag){ d.props.push({k:editor.key,x:tx,y:ty}); } }
  else if(t==='deco'){
    let bestS=null,bd=1e9;
    d.structs.forEach(st2=>{ const [rw,rh]=STRUCT_SIZE[st2.k]||[6,5];
      if(tx>=st2.x&&tx<st2.x+rw&&ty>=st2.y&&ty<st2.y+rh){ bestS=st2; bd=0; } });
    if(bestS&&bestS.k!=='board') openDeco(bestS);
    return;
  }
  else if(t==='struct'){
    const ex=d.structs.find(x2=>x2.k===editor.key);
    if(ex){ ex.x=tx; ex.y=ty; } else d.structs.push({k:editor.key,x:tx,y:ty});
  }
  else if(t==='del'){
    let best=-1,bd=1e9;
    d.props.forEach((p,i)=>{ const dd=Math.hypot(p.x-tx,p.y-ty); if(dd<bd){bd=dd;best=i;} });
    let bestS=-1,bdS=1e9;
    d.structs.forEach((p,i)=>{ const dd=Math.hypot(p.x+2-tx,p.y+2-ty); if(dd<bdS){bdS=dd;bestS=i;} });
    if(bestS>=0&&bdS<2.5&&bdS<bd) d.structs.splice(bestS,1);
    else if(best>=0&&bd<1.6) d.props.splice(best,1);
  }
  buildScene(scene);
}

function renderDeco(){
  const st=deco.st; if(!st) return;
  const [rw,rh]=STRUCT_SIZE[st.k]||[6,5];
  const cv2=document.getElementById('decoCv'), g=cv2.getContext('2d');
  g.imageSmoothingEnabled=false;
  const T2=deco.T2, k2=T2/32;
  for(let y=0;y<rh;y++) for(let x=0;x<rw;x++){
    g.fillStyle=(x+y)%2?'#e6c493':'#dfbb87'; g.fillRect(x*T2,y*T2,T2,T2);
  }
  const wall=(img,x,y)=>{ if(img) g.drawImage(img,0,0,16,16,x*T2,y*T2,T2,T2); };
  for(let x=0;x<rw;x++){ wall(IMGS.wallM,x,0); if(!(x===2||x===3||(st.k==='hall'&&(x===5||x===6)))) wall(IMGS.wallM,x,rh-1); }
  for(let y=0;y<rh;y++){ wall(IMGS.wallL,0,y); wall(IMGS.wallR,rw-1,y); }
  (st.furn||[]).forEach(f=>{

function decoClick(e){
  const st=deco.st; if(!st) return;
  const cv2=document.getElementById('decoCv'), r=cv2.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(cv2.width/r.width), my=(e.clientY-r.top)*(cv2.height/r.height);
  const T2=deco.T2;
  if(!st.furn) st.furn=[];
  if(deco.mode==='del'){
    let best=-1,bd=1e9;
    st.furn.forEach((f,i)=>{
      const img=IMGS[f.k]; if(!img) return;
      const cx=f.fx*T2+img.width*T2/32, cy=f.fy*T2+img.height*T2/32;
      const dd=Math.hypot(cx-mx,cy-my); if(dd<bd){bd=dd;best=i;}
    });
    if(best>=0&&bd<T2*1.5) st.furn.splice(best,1);
  } else {
    const img=IMGS[deco.key]; if(!img) return;
    const fx=Math.round((mx/T2 - img.width/32)*4)/4;
    const fy=Math.round((my/T2 - img.height/16 + 0.5)*4)/4;
    const [rw,rh]=STRUCT_SIZE[st.k]||[6,5];
    st.furn.push({k:deco.key, fx:Math.max(0.2,Math.min(rw-img.width/16-0.2,fx)), fy:Math.max(0.4,Math.min(rh-img.height/16,fy))});
  }
  renderDeco();
}

function drawBoothStruct(c,bx,by,co){

  // 뒷줄: 울타리
  for(let i=0;i<8;i++){ const k=i===0?'fenH_l':(i===7?'fenH_r':'fenH_m');
    T(c,IMGS[k],0,0,px+i*TILE,py); }

  const sg=IMGS.sign2; if(sg){ c.drawImage(sg,px+8,py-20,sg.width*2,sg.height*2); c.drawImage(sg,px+bw-8-sg.width*2,py-20,sg.width*2,sg.height*2); }

function chatLog(name,text){
  const log=document.getElementById('chatLog');
  const d=document.createElement('div'); d.textContent=name+': '+text;
  log.appendChild(d);
  while(log.children.length>6) log.removeChild(log.firstChild);

function initRealtime(){
  try{
    if(!window.supabase) return;
    const cl=window.supabase.createClient('https://wwpvntmueafieessgnbu.supabase.co', ANON);
    rt=cl.channel('village-v1',{config:{presence:{key:myPid},broadcast:{self:false}}});
    rt.on('presence',{event:'sync'},()=>{
      const st=rt.presenceState();
      for(const k in others){ if(!st[k]) delete others[k]; }
      for(const k in st){ if(k===myPid) continue;
        const m=st[k][0]; if(!m) continue;
        const o=others[k]||(others[k]={dx:m.x,dy:m.y});
        Object.assign(o,m);
      }
    });
    rt.on('broadcast',{event:'chat'},({payload})=>{
      if(!payload||payload.key===myPid) return;
      chatLog(payload.name||'여행자',payload.text||'');
      const o=others[payload.key];
      if(o){ o.chatText=payload.text; o.chatUntil=performance.now()+4500; }
    });
    rt.subscribe((status)=>{ if(status==='SUBSCRIBED') trackNow(true); });
  }catch(e){ console.warn('realtime fail',e); }
}
let lastTrack=0, lastSig='';
function trackNow(force){
  if(!rt) return;
  const now=Date.now();
  if(!force && now-lastTrack<250) return;
  const st={x:Math.round(player.x),y:Math.round(player.y),dir:player.dir,moving:player.moving,char:me?me.char:'slc_cream',name:me?me.name:'여행자',scene};
  const sig=JSON.stringify(st);
  if(!force && sig===lastSig) return;
  lastTrack=now; lastSig=sig;
  try{ rt.track(st); }catch{}
}
function drawOthers(t,dt){
  const now=performance.now();
  Object.values(others).forEach(o=>{
    if(o.scene!==scene) return;
    if(o.dx===undefined){ o.dx=o.x; o.dy=o.y; }
    o.dx+=(o.x-o.dx)*Math.min(1,dt*10); o.dy+=(o.y-o.dy)*Math.min(1,dt*10);
    const moving=Math.hypot(o.x-o.dx,o.y-o.dy)>2||o.moving;
    drawChar(o.char||'slc_cream',o.dx,o.dy,o.dir||'down',moving,t);
    drawTag(o.name||'여행자',o.dx,o.dy,o.char||'slc_cream','#cfe8ff');
    if(o.chatUntil&&now<o.chatUntil){
      ctx.font='bold 13px Pretendard,sans-serif';
      const tw=Math.min(ctx.measureText(o.chatText).width,300);
      const bx=o.dx-tw/2-10, by=o.dy-tagTopOf(o.char)-46;

    }
  });
}

  for(const n of s.npcs){ if(Math.hypot(player.x-n.x, player.y-n.y)<52) return {label:n.name+'와 대화',act:'talk',npc:n}; }

function isSolid(x,y){
  const s=SC[scene];
  const tx=Math.floor(x/TILE), ty=Math.floor(y/TILE);
  if(tx<0||ty<0||tx>=s.cols||ty>=s.rows) return false;
  return s.solid[ty][tx];
}
let last=performance.now();
function loop(now){
  const dt=Math.min(50, now-last)/1000; last=now;
  let dx=0,dy=0;
  if(!modalOpen()&&!(editor.on&&editor.drag)){
    if(keys['ArrowLeft']||keys['a']) dx=-1; if(keys['ArrowRight']||keys['d']) dx=1;
    if(keys['ArrowUp']||keys['w']) dy=-1; if(keys['ArrowDown']||keys['s']) dy=1;
  }
  player.moving=!!(dx||dy);
  if(dx||dy){
    const sp=155*dt, nx=player.x+dx*sp, ny=player.y+dy*sp;
    if(!isSolid(nx-8,player.y)&&!isSolid(nx+8,player.y)) player.x=nx;
    if(!isSolid(player.x,ny-4)&&!isSolid(player.x,ny+8)) player.y=ny;
    player.dir=dy<0?'up':dy>0?'down':dx<0?'left':'right';
  }
  const sw=SC[scene].w, sh=SC[scene].h;
  if(scene==='camp' && player.y>sh-14 && player.x>13*TILE && player.x<17*TILE){ switchScene('road',27*TILE,1.6*TILE,'down'); }
  else if(scene==='road' && player.y<10 && player.x>25*TILE && player.x<29*TILE){ switchScene('camp',15*TILE,(SC.camp.rows-1.4)*TILE,'up'); }
  else if(scene==='road' && SC.road.hallRect){ const hr=SC.road.hallRect;
    if(player.x>hr.x1&&player.x<hr.x2&&player.y>hr.y1&&player.y<hr.y2){ switchScene('festa',22*TILE,23*TILE,'up'); say('🎪 보드게임 페스타에 오신 걸 환영해요!'); } }
  player.x=Math.max(12,Math.min(sw-12,player.x)); player.y=Math.max(2,Math.min(sh-4,player.y));
  coins.forEach(cn=>{ if(!cn.got && Math.hypot(cn.x*TILE+16-player.x, cn.y*TILE+16-player.y)<20){ cn.got=true; points+=10; saveCoins(); say('+10 포인트! 🪙',900); } });
  // 동물 배회
  const s0=SC[scene];
  if(s0&&s0.animals&&s0.animals.length){
    s0.animals.forEach(a=>{
      a.t-=dt;
      if(a.t<=0){ a.t=2+Math.random()*4;
        const z=s0.animalZone;
        a.tx=z.x1+Math.random()*(z.x2-z.x1); a.ty=z.y1+Math.random()*(z.y2-z.y1); }
      const ddx=a.tx-a.x, ddy=a.ty-a.y;
      if(Math.hypot(ddx,ddy)>4){ a.x+=ddx*dt*0.5; a.y+=ddy*dt*0.5;
        a.flip=ddx<0; a.movingRow=true; a.fr+=dt*6; }
      else { a.movingRow=false; a.fr+=dt*2.5; }
    });
  }
  trackNow();
  // 작가/NPC 배회
  const sN=SC[scene];
  if(sN&&sN.npcs) sN.npcs.forEach(n=>{
    if(!n.wander) return;
    n._t=(n._t||0)-dt;
    if(n._t<=0){ n._t=3+Math.random()*4;
      n._tx=n.wander.x1+Math.random()*(n.wander.x2-n.wander.x1);
      n._ty=n.wander.y1+Math.random()*(n.wander.y2-n.wander.y1); }
    if(n._tx!==undefined){
      const ddx=n._tx-n.x, ddy=n._ty-n.y;
      if(Math.hypot(ddx,ddy)>4){ n.x+=ddx*dt*0.5; n.y+=ddy*dt*0.5;
        n.dir=Math.abs(ddx)>Math.abs(ddy)?(ddx<0?'left':'right'):(ddy<0?'up':'down');
        n.moving=true; }
      else n.moving=false;
    }
  });
  cam.x = sw>VW ? Math.max(0,Math.min(sw-VW, player.x-VW/2)) : (sw-VW)/2;
  cam.y = sh>VH ? Math.max(0,Math.min(sh-VH, player.y-VH/2)) : (sh-VH)/2;

  ctx.clearRect(0,0,VW,VH);
  ctx.save(); ctx.translate(-cam.x,-cam.y);
  drawSceneDyn(now,dt);
  const myKey=me?me.char:'slc_cream';
  drawChar(myKey,player.x,player.y,player.dir,player.moving,now);
  drawTag(me?me.name:'여행자',player.x,player.y,myKey);
  if(bubble && now<bubble.until){
    ctx.font='bold 13px Pretendard,sans-serif';
    const tw=Math.min(ctx.measureText(bubble.text).width, 430);
    const bx=Math.max(cam.x+10,Math.min(cam.x+VW-tw-30,bubble.x-tw/2-10)), by=bubble.y-26;
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.roundRect(bx,by,tw+20,26,8); ctx.fill();
    ctx.beginPath(); ctx.moveTo(bubble.x-5,by+26); ctx.lineTo(bubble.x+5,by+26); ctx.lineTo(bubble.x,by+33); ctx.fill();
    ctx.fillStyle='#222'; ctx.textAlign='left'; ctx.fillText(bubble.text,bx+10,by+18,430);
  }
  ctx.restore();
  const p=modalOpen()?null:nearPrompt(); const hint=document.getElementById('hint');
  if(p){ hint.style.display='block'; hint.textContent='E — '+p.label; } else hint.style.display='none';
  requestAnimationFrame(loop);
}

// ── 초기화 ──
function makeCharCell(grid,key,labelText){
  const btn=document.createElement('div'); btn.className='cbtn'; btn.dataset.key=key;
  const cc=document.createElement('canvas'); cc.width=48; cc.height=58;
  btn.appendChild(cc);
  if(labelText){ const lb=document.createElement('div');
    lb.style.cssText='font-size:10px;font-weight:800;color:#b8860b;padding-bottom:2px'; lb.textContent=labelText; btn.appendChild(lb); }
  grid.appendChild(btn);
  const g=cc.getContext('2d'); g.imageSmoothingEnabled=false;
  charPreview(g,key);
  btn.onclick=()=>{ grid.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('sel')); btn.classList.add('sel'); charSel=key; };
  return btn;
}
function openCreator(){
  const c=document.getElementById('creator');
  document.getElementById('nm').value=me?me.name:'여행자';
  charSel=me?me.char:'slc_cream';
  c.querySelectorAll('.cbtn').forEach(b=>b.classList.toggle('sel',b.dataset.key===charSel));
  if(!c.querySelector('.sel')){ const f=c.querySelector('.cbtn'); if(f){ f.classList.add('sel'); charSel=f.dataset.key; } }
  c.style.display='flex';
}
async function init(){
  await loadWorldMaps();
  document.getElementById('loading').style.display='none';
  makeBookshelfSprite();
  buildCamp(); buildRoad(); buildFesta();
  edInit();
  loadCoins();
  const grid=document.getElementById('charGrid');
  SLC.forEach(cn=>makeCharCell(grid,'slc_'+cn));
  grid.querySelector('.cbtn').classList.add('sel');
  document.getElementById('go').onclick=()=>{
    me={ name:(document.getElementById('nm').value||'여행자').slice(0,8), char:charSel };
    store.set('me',me); document.getElementById('creator').style.display='none';
  };
  initRealtime();
  document.getElementById('chatSend').onclick=sendChat;
  document.getElementById('chatIn').addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); sendChat(); } if(e.key==='Escape'){ document.getElementById('chatBar').style.display='none'; e.target.blur(); } });
  document.getElementById('btnChat').addEventListener('click',openChat);
  if(!me) openCreator();
  requestAnimationFrame(loop);
}
// 디버그/테스트용 핸들 (프로토타입)
window.__v={ player, keys, doAction, switchScene, get scene(){return scene}, get points(){return points}, get cam(){return cam} };
</script>
