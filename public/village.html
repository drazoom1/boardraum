<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>보드마을 — 보드라움</title>
<!-- Graphics: "Modern Exteriors" by LimeZu (itch.io, 구매 라이선스) + "Ninja Adventure" by Pixel-boy (CC0) -->
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; background:#1d2b20; font-family:'Pretendard',-apple-system,sans-serif; overflow:hidden; touch-action:none; }
  #wrap { display:flex; align-items:center; justify-content:center; height:100%; }
  canvas#cv { image-rendering:pixelated; max-width:100vw; max-height:100vh; border-radius:6px; }
  #hud { position:fixed; top:10px; left:10px; display:flex; gap:8px; align-items:center; z-index:5; }
  .chip { background:rgba(0,0,0,.55); color:#fff; padding:6px 12px; border-radius:20px; font-size:14px; font-weight:700; }
  #hint { position:fixed; bottom:110px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,.65); color:#fff; padding:8px 16px; border-radius:12px; font-size:14px; display:none; z-index:5; }
  #dpad { position:fixed; left:14px; bottom:14px; display:grid; grid-template:repeat(3,52px)/repeat(3,52px); gap:2px; z-index:6; opacity:.85; }
  #dpad button, #btnE { background:rgba(255,255,255,.18); border:1.5px solid rgba(255,255,255,.35); color:#fff; border-radius:12px; font-size:20px; font-weight:800; -webkit-user-select:none; user-select:none; }
  #btnE { position:fixed; right:18px; bottom:34px; width:72px; height:72px; border-radius:50%; font-size:22px; background:rgba(255,210,80,.25); border-color:rgba(255,210,80,.6); z-index:6; }
  #creator { position:fixed; inset:0; background:rgba(12,20,14,.88); display:flex; align-items:center; justify-content:center; z-index:10; }
  #creator .card { background:#fff; border-radius:20px; padding:24px; width:340px; text-align:center; }
  #creator h1 { font-size:20px; margin-bottom:4px; }
  #creator p { font-size:13px; color:#888; margin-bottom:12px; }
  #creator input { width:100%; border:1.5px solid #ddd; border-radius:10px; padding:10px; font-size:15px; text-align:center; margin-bottom:12px; }
  .swlabel { font-size:12px; color:#666; font-weight:700; margin-bottom:6px; }
  #charGrid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:4px; }
  #charGrid .cbtn { border:2.5px solid #eee; border-radius:12px; padding:6px 0 2px; cursor:pointer; background:#fafafa; }
  #charGrid .cbtn.sel { border-color:#111; background:#fff6e0; }
  #charGrid canvas { image-rendering:pixelated; }
  #creator button.go { margin-top:12px; width:100%; background:#111; color:#fff; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:800; cursor:pointer; }
  #loading { position:fixed; inset:0; background:#1d2b20; color:#fff; display:flex; align-items:center; justify-content:center; z-index:20; font-weight:800; }
  @media (hover:hover) and (pointer:fine) { #dpad,#btnE { display:none; } }
</style>
</head>
<body>
<div id="wrap"><canvas id="cv" width="960" height="704"></canvas></div>
<div id="hud">
  <span class="chip">🪙 <span id="pts">0</span></span>
  <span class="chip" id="loc">🏕️ 보드마을</span>
</div>
<div id="hint"></div>
<div id="dpad">
  <span></span><button data-k="ArrowUp">▲</button><span></span>
  <button data-k="ArrowLeft">◀</button><span></span><button data-k="ArrowRight">▶</button>
  <span></span><button data-k="ArrowDown">▼</button><span></span>
</div>
<button id="btnE">E</button>

<div id="creator" style="display:none">
  <div class="card">
    <h1>🏕️ 보드마을에 오신 걸 환영해요!</h1>
    <p>캐릭터를 고르고 마을을 돌아다니며<br>코인을 모으고, 내 캠핑카 책장을 구경하세요.</p>
    <input id="nm" placeholder="닉네임" maxlength="8" value="여행자">
    <div class="swlabel">내 캐릭터</div>
    <div id="charGrid"></div>
    <button class="go" id="go">마을 입장 🎲</button>
  </div>
</div>
<div id="loading">🎲 보드마을 불러오는 중...</div>

<script>
const TILE=32, COLS=30, ROWS=22, W=COLS*TILE, H=ROWS*TILE;
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;

// ── 저장 ──
const store={ get:(k,d)=>{try{const v=localStorage.getItem('village_'+k);return v?JSON.parse(v):d}catch{return d}}, set:(k,v)=>{try{localStorage.setItem('village_'+k,JSON.stringify(v))}catch{}} };
let points=store.get('points',0);
document.getElementById('pts').textContent=points;

// ── 에셋 로드 ──
const CHARS=['Boy','Princess','Villager','Woman','Knight','Monk','Eskimo','Villager2'];
const ME=['grass1','grass2','tuft1','tuft2','tuft3','tuft4','tuft5','dirtauto','dirt_fp1','dirt_fp2',
  'waterauto','water2','lily1','lily2','tent_blue','tentS_green','sign_camping','store_blue','store_pink',
  'signboard2','camper','fire1','fire2','btable','lamp','fount1','fount2','fbush1','fbush2','fbush3',
  'lantern','ball1','picnic','tree1','tree2','tree4'];
const IMGS={};
const toLoad=[...ME.map(k=>'me/'+k),'coin','npc',...CHARS.map(c=>'char_'+c)];
let loadedN=0;
toLoad.forEach(k=>{ const im=new Image(); im.src='village-assets/'+k+'.png';
  const key=k.replace('me/','');
  im.onload=()=>{ IMGS[key]=im; if(++loadedN>=toLoad.length) init(); };
  im.onerror=()=>{ console.warn('load fail',k); if(++loadedN>=toLoad.length) init(); }; });

// ── 캐릭터 선택 ──
let me=store.get('me',null);
if(me && !me.char) me=null;
let charSel=0;

// ── 맵 ──  0잔디 1길 2물
const map=[], solid=[];
for(let y=0;y<ROWS;y++){ map[y]=[]; solid[y]=[]; for(let x=0;x<COLS;x++){ map[y][x]=0; solid[y][x]=false; } }
const rng=(x,y)=>{ let h=(x*374761393+y*668265263)^(x*y*1274126177); h=(h^(h>>13))*1103515245; return (h^(h>>16))>>>0; };
const setRect=(arr,x,y,w,h,v)=>{ for(let j=y;j<y+h;j++) for(let i=x;i<x+w;i++){ if(j>=0&&j<ROWS&&i>=0&&i<COLS) arr[j][i]=v; } };
// 길 (가로 3칸 폭 — 위/아래 가장자리 타일이 풀 위주라 3줄이어야 도톰해 보임)
setRect(map,2,11,26,3,1);   // 동서대로
setRect(map,14,2,2,9,1);    // 남북대로(위)
setRect(map,14,14,2,6,1);   // 남북대로(아래)
// 연못
const POND={x:23,y:15,w:5,h:5};
setRect(map,POND.x,POND.y,POND.w,POND.h,2); setRect(solid,POND.x,POND.y,POND.w,POND.h,true);
// 테두리(숲) 충돌
setRect(solid,0,0,COLS,2,true); setRect(solid,0,ROWS-2,COLS,2,true);
setRect(solid,0,0,2,ROWS,true); setRect(solid,COLS-2,0,2,ROWS,true);

// ── 건물/구조물 ──
const buildings=[
  { img:'camper',     x:3,  y:6,  w:6, h:4, label:'내 집',        action:'home',   door:[6,10.2] },
  { img:'store_blue', x:18, y:6,  w:5, h:5, label:'보드위키 도서관', action:'wiki',   door:[19.5,11.2] },
  { img:'store_pink', x:5,  y:14, w:5, h:5, label:'보드마켓',      action:'market', door:[6.5,19.2], wip:true },
  { img:'signboard2', x:16, y:14, w:7, h:4, label:'마을 게시판',    action:'board',  door:[19.5,18.2], noplaque:true },
];
buildings.forEach(b=>setRect(solid,b.x,b.y,b.w,b.h,true));
const FOUNT={x:16,y:8}; setRect(solid,FOUNT.x,FOUNT.y+1,2,2,true); // 분수 (2x3, 기둥부만 충돌)
// 캠핑장 소품 충돌
const TENT={x:3,y:1}; setRect(solid,TENT.x,TENT.y+1,4,3,true);
const TENTS={x:9,y:2}; setRect(solid,TENTS.x,TENTS.y,2,2,true);
const BTABLE={x:10,y:4}; setRect(solid,BTABLE.x,BTABLE.y,2,2,true);
const SIGN={x:9,y:9};    // 캠핑 입간판 5x2 (비충돌 장식)
const PICNIC={x:19,y:18.6};
const LAMPS=[[12,9],[24,10],[12,16]];
LAMPS.forEach(([x,y])=>{ solid[y][x]=true; });
// 나무 (트렁크 앵커 타일)
const TREES=[[11,3,'tree1'],[25,4,'tree4'],[26,13,'tree2'],[11,16,'tree1'],[3,20,'tree2']];
TREES.forEach(([x,y])=>{ if(y<ROWS&&x<COLS) solid[y][x]=true; });

let coins=store.get('coins_v5', [[4,12],[9,12],[13,12],[18,12],[23,12],[26,12],[14,4],[15,7],[14,16],[15,18],[11,19],[24,13]].map(([x,y])=>({x,y,got:false})));
function saveCoins(){ store.set('coins_v5',coins); store.set('points',points); document.getElementById('pts').textContent=points; }

// ── 책장 게임 ──
let shelfGames=[];
try{
  for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i);
    if(k && k.startsWith('boardraum_owned_') && !k.endsWith('anon')){ const arr=JSON.parse(localStorage.getItem(k)); if(Array.isArray(arr)&&arr.length){ shelfGames=arr.slice(0,16); break; } } }
}catch{}
if(!shelfGames.length){
  shelfGames=[
    {koreanName:'스플렌더', imageUrl:'https://cf.geekdo-images.com/vNFe4JkhKAERzi4T0Ntwpw__original/img/rqcUdtu_N4v-SpI96XVmpYHnJww=/0x0/filters:format(png)/pic8234167.png'},
    {koreanName:'치킨차차', imageUrl:'https://cf.geekdo-images.com/ZxGfy7AR2mjrKVDiDVJoBw__original/img/vmsm-xQFLSoTtM4cgm0WIVO_dZ0=/0x0/filters:format(jpeg)/pic406697.jpg'},
    {koreanName:'아크 노바'},{koreanName:'테라포밍 마스'},{koreanName:'윙스팬'},{koreanName:'푸에르토리코'},
    {koreanName:'글룸헤이븐'},{koreanName:'카탄'},{koreanName:'스컬킹'},{koreanName:'다빈치코드'},
  ];
}
const coverImgs={};
shelfGames.forEach((g,i)=>{ if(g.imageUrl){ const im=new Image(); im.src=g.imageUrl; im.onload=()=>coverImgs[i]=im; } });

// ── 입력 ──
let scene='village';
const player={ x:14.5*TILE, y:13.5*TILE, dir:'down', frame:0, ft:0, moving:false };
const keys={};
const typing=e=>e.target&&['INPUT','TEXTAREA'].includes(e.target.tagName);
addEventListener('keydown',e=>{ if(typing(e)) return; keys[e.key]=true; if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault(); if(e.key==='e'||e.key==='E'||e.key==='Enter') doAction(); });
addEventListener('keyup',e=>{ if(typing(e)) return; keys[e.key]=false; });
addEventListener('blur',()=>{ for(const k in keys) keys[k]=false; });
document.querySelectorAll('#dpad button').forEach(b=>{ const k=b.dataset.k;
  b.addEventListener('touchstart',e=>{e.preventDefault();keys[k]=true;},{passive:false});
  b.addEventListener('touchend',e=>{e.preventDefault();keys[k]=false;},{passive:false}); });
document.getElementById('btnE').addEventListener('touchstart',e=>{e.preventDefault();doAction();},{passive:false});
document.getElementById('btnE').addEventListener('click',()=>doAction());

const npc={ x:19*TILE, y:14.5*TILE, tx:19*TILE, ty:14.5*TILE, t:0, dir:'down', frame:0 };
let bubble=null;
function say(t,ms=2600){ bubble={text:t, until:performance.now()+ms}; }

function nearPrompt(){
  const py=Math.floor(player.y/TILE);
  if(scene==='village'){
    for(const b of buildings){ const dcx=b.door[0]*TILE, dcy=b.door[1]*TILE;
      if(Math.hypot(player.x-dcx, player.y-dcy)<56) return b; }
  } else if(scene==='home'){
    if(py>=18) return {action:'exit',label:'마을로 나가기'};
    if(py<=13) return {action:'shelf',label:'책장 구경'};
  }
  return null;
}
function doAction(){
  const p=nearPrompt(); if(!p) return;
  if(p.action==='home'){ scene='home'; player.x=480; player.y=612; player.dir='up'; document.getElementById('loc').textContent='🚐 내 캠핑카'; say((me?me.name:'나')+'의 아늑한 캠핑카 🛋️'); }
  else if(p.action==='exit'){ scene='village'; player.x=6*TILE, player.y=10.8*TILE; player.dir='down'; document.getElementById('loc').textContent='🏕️ 보드마을'; }
  else if(p.action==='wiki'){ say('📚 보드위키 도서관! (보드라움 위키로 연결 예정)'); }
  else if(p.action==='market'){ say('🚧 보드마켓 — 공사중이에요! 곧 열려요'); }
  else if(p.action==='board'){ say('📢 코보게 7월 신작 소식이 올라왔어요!'); }
  else if(p.action==='shelf'){ say('🎲 내 보드게임 '+shelfGames.length+'개 전시 중! 뿌듯하다~'); }
}

// ── 그리기 헬퍼 ──
function T(c,img,tx,ty,X,Y){ if(img) c.drawImage(img,tx*16,ty*16,16,16,X,Y,TILE,TILE); }
function P2(c,key,px,py){ const img=IMGS[key]; if(img) c.drawImage(img,px,py,img.width*2,img.height*2); }
function drawActor(c,img,X,Y,dir,frame,s=2){
  if(!img) return;
  const fw=img.width/4, fh=img.height/4;
  const col={down:0,up:1,left:2,right:3}[dir]||0;
  c.fillStyle='rgba(0,0,0,.25)'; c.beginPath(); c.ellipse(X,Y+1,fw*s*0.32,fh*s*0.10,0,0,7); c.fill();
  c.drawImage(img,col*fw,(frame%4)*fh,fw,fh, X-fw*s/2, Y-fh*s, fw*s, fh*s);
}

// ── 마을 베이크 ──
const bake=document.createElement('canvas'); bake.width=W; bake.height=H;
const b2=bake.getContext('2d'); b2.imageSmoothingEnabled=false;
function roadPiece(x,y){
  const is=(dx,dy)=>{ const ty=y+dy,tx=x+dx; return ty>=0&&ty<ROWS&&tx>=0&&tx<COLS&&map[ty][tx]===1; };
  const n=is(0,-1),s=is(0,1),e=is(1,0),w=is(-1,0);
  const ci=!w?0:(!e?3:((x%2)?1:2));
  const ri=!n?0:(!s?3:((y%2)?1:2));
  return [ci,ri];
}
function bakeVillage(){
  const c=b2;
  // 잔디 + 데코
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    const r=rng(x,y);
    T(c,IMGS[r%3===0?'grass2':'grass1'],0,0,x*TILE,y*TILE);
    if(map[y][x]===0 && r%7===0){ T(c,IMGS['tuft'+(1+r%5)],0,0,x*TILE,y*TILE); }
  }
  // 길 (dirtauto 4x4 오토타일)
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++) if(map[y][x]===1){
    const [ci,ri]=roadPiece(x,y);
    T(c,IMGS.dirtauto,ci,ri,x*TILE,y*TILE);
    const r=rng(x*3,y*5);
    if(r%23===0) T(c,IMGS[r%2?'dirt_fp1':'dirt_fp2'],0,0,x*TILE,y*TILE);
  }
  // 연못 (waterauto 3x3)
  for(let y=POND.y;y<POND.y+POND.h;y++) for(let x=POND.x;x<POND.x+POND.w;x++){
    const cx=x===POND.x?0:(x===POND.x+POND.w-1?2:1);
    const cy=y===POND.y?0:(y===POND.y+POND.h-1?2:1);
    if(cx===1&&cy===1&&rng(x,y)%3===0) T(c,IMGS.water2,0,0,x*TILE,y*TILE);
    else T(c,IMGS.waterauto,cx,cy,x*TILE,y*TILE);
  }
  // ── y-정렬 스프라이트 ──
  const sp=[];
  const add=(key,px,py)=>{ const img=IMGS[key]; if(img) sp.push({key,px,py,base:py+img.height*2}); };
  // 테두리 숲 (위/아래/좌/우)
  for(let x=-1;x<COLS;x+=2){ add(rng(x,0)%4===0?'tree2':'tree1', x*TILE, -70); }
  for(let x=-1;x<COLS;x+=2){ add(rng(x,9)%5===0?'tree4':'tree1', x*TILE, H-100); }
  for(let y=1;y<ROWS-2;y+=2){ add(rng(0,y)%4===0?'tree2':'tree1', -40, y*TILE-40); add(rng(9,y)%4===0?'tree4':'tree1', W-88, y*TILE-40); }
  // 내부 나무
  TREES.forEach(([x,y,k])=>add(k, x*TILE+16-64, y*TILE+32-120));
  // 캠핑장
  add('tent_blue', TENT.x*TILE, TENT.y*TILE);
  add('tentS_green', TENTS.x*TILE, TENTS.y*TILE);
  add('btable', BTABLE.x*TILE, BTABLE.y*TILE);
  add('lantern', 9.4*TILE, 7*TILE);
  add('sign_camping', SIGN.x*TILE, SIGN.y*TILE);
  add('picnic', PICNIC.x*TILE, PICNIC.y*TILE);
  add('ball1', 21.3*TILE, 18.8*TILE);
  add('fbush1', 17.5*TILE, 5.4*TILE);
  add('fbush2', 3*TILE, 12.2*TILE);
  add('fbush3', 24*TILE, 13.4*TILE);
  add('fbush1', 10*TILE, 13.2*TILE);
  // 건물
  buildings.forEach(b=>{
    const img=IMGS[b.img]; if(!img) return;
    sp.push({key:b.img, px:b.x*TILE, py:(b.y+b.h)*TILE-img.height*2, base:(b.y+b.h)*TILE, shadow:true});
  });
  // 가로등
  LAMPS.forEach(([x,y])=>add('lamp', x*TILE-16, (y+1)*TILE-128));
  // 그림자+그리기 (y정렬)
  sp.sort((a,b)=>a.base-b.base);
  sp.forEach(s=>{
    const img=IMGS[s.key]; if(!img) return;
    if(s.shadow){ c.fillStyle='rgba(0,0,0,.18)'; c.beginPath();
      c.ellipse(s.px+img.width, s.base-4, img.width*0.9, 8, 0,0,7); c.fill(); }
    c.drawImage(img, s.px, s.py, img.width*2, img.height*2);
  });
  // 간판(플로팅 라벨)
  buildings.forEach(b=>{
    if(b.noplaque) return;
    const img=IMGS[b.img]; if(!img) return;
    c.font='bold 13px Pretendard,sans-serif'; c.textAlign='center';
    const lx=b.x*TILE+img.width, topY=(b.y+b.h)*TILE-img.height*2;
    const lw=c.measureText(b.label).width, ly=topY-12;
    c.fillStyle='#5c3f22'; c.fillRect(lx-lw/2-10,ly-16,lw+20,22);
    c.fillStyle='#f5e9d0'; c.fillRect(lx-lw/2-8,ly-14,lw+16,18);
    c.fillStyle='#5c3f22'; c.fillText(b.label,lx,ly);
    if(b.wip){ const dx=b.door[0]*TILE, dy=b.door[1]*TILE-14;
      c.fillStyle='#f4d35e'; c.fillRect(dx-21,dy,42,9);
      c.fillStyle='#222'; for(let i=0;i<5;i++) c.fillRect(dx-21+i*10,dy,5,9);
      c.fillStyle='#fff'; c.font='bold 8px sans-serif'; c.fillText('공사중',dx,dy+7); }
  });
}

// ── 동적 요소 ──
const smoke=[]; let smokeT=0;
const butterflies=[{x:320,y:230,p:0},{x:660,y:480,p:2}];
const FIREPOS={x:10.3*TILE, y:6.8*TILE};
function drawVillageDyn(t,dt){
  ctx.drawImage(bake,0,0);
  // 분수 (2프레임)
  P2(ctx,(Math.floor(t/450)%2)?'fount1':'fount2', FOUNT.x*TILE, FOUNT.y*TILE);
  // 모닥불 (2프레임 + 불빛)
  P2(ctx,(Math.floor(t/180)%2)?'fire1':'fire2', FIREPOS.x, FIREPOS.y);
  const gl=0.06+Math.sin(t/150)*0.03;
  ctx.fillStyle=`rgba(255,160,60,${gl})`; ctx.beginPath(); ctx.arc(FIREPOS.x+16,FIREPOS.y+22,42,0,7); ctx.fill();
  // 모닥불 연기
  smokeT-=dt; if(smokeT<=0){ smokeT=0.7;
    smoke.push({x:FIREPOS.x+16, y:FIREPOS.y+6, r:2.5, a:0.4, vx:(Math.random()-0.3)*5, vy:-11-Math.random()*5}); }
  for(let i=smoke.length-1;i>=0;i--){ const s=smoke[i];
    s.x+=s.vx*dt; s.y+=s.vy*dt; s.r+=dt*4; s.a-=dt*0.14;
    if(s.a<=0){ smoke.splice(i,1); continue; }
    ctx.fillStyle=`rgba(230,230,230,${s.a})`; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,7); ctx.fill(); }
  // 수련잎 (봅)
  [[24.2,16.4,'lily1'],[26.2,18.2,'lily2'],[25.3,15.4,'lily1']].forEach(([lx,ly,k],i)=>{
    const bob=Math.sin(t/900+i*2)*1.5;
    const img=IMGS[k]; if(img) ctx.drawImage(img, lx*TILE, ly*TILE+bob, 32,32);
  });
  // 물 반짝임
  for(let i=0;i<3;i++){ const rr=rng(i*7,Math.floor(t/700)+i);
    const sx=(POND.x+(rr%POND.w))*TILE+(rr>>4)%20, sy=(POND.y+((rr>>2)%POND.h))*TILE+((rr>>6)%20);
    ctx.fillStyle='rgba(255,255,255,.6)'; ctx.fillRect(sx,sy,3,2); }
  // 코인
  coins.forEach(cn=>{ if(cn.got) return; const X=cn.x*TILE+16, Y=cn.y*TILE+14+Math.sin(t/300+cn.x)*3;
    ctx.fillStyle='rgba(0,0,0,.2)'; ctx.beginPath(); ctx.ellipse(X,cn.y*TILE+27,6,2,0,0,7); ctx.fill();
    if(IMGS.coin) ctx.drawImage(IMGS.coin,X-7,Y-7,14,14);
    else { ctx.fillStyle='#f4c430'; ctx.beginPath(); ctx.arc(X,Y,7,0,7); ctx.fill(); } });
  // 나비
  butterflies.forEach(bf=>{ bf.p+=dt;
    const bx=bf.x+Math.sin(bf.p*0.7)*60+Math.sin(bf.p*2.3)*14, by=bf.y+Math.cos(bf.p*0.9)*40;
    const wing=Math.sin(bf.p*18)*3;
    ctx.fillStyle='#fff'; ctx.fillRect(bx-3-wing,by-2,3+wing,4); ctx.fillRect(bx+1,by-2,3+wing,4);
    ctx.fillStyle='#f4d35e'; ctx.fillRect(bx-2-wing,by-1,2,2); ctx.fillRect(bx+2,by-1,2,2);
    ctx.fillStyle='#2b2019'; ctx.fillRect(bx-0.5,by-2.5,1.5,5); });
  // NPC
  drawActor(ctx,IMGS.npc,npc.x,npc.y,npc.dir,Math.floor(npc.frame));
  // 구름 그림자
  const cs=(t/40)%1400-200;
  ctx.fillStyle='rgba(20,45,25,.10)';
  ctx.beginPath(); ctx.ellipse(cs,180,130,45,0,0,7); ctx.ellipse(cs+90,210,90,35,0,0,7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(1100-cs*0.7,520,110,40,0,0,7); ctx.fill();
}

  ctx.fillStyle='#93683f'; for(let x=0;x<W;x+=26){ ctx.fillRect(x,8,2,54); }

  ctx.fillStyle='#f2e6cf'; ctx.fillRect(0,70,W,20);

  win(60); win(816);
  ctx.fillStyle='rgba(255,240,190,.10)';
  ctx.beginPath(); ctx.moveTo(60,62); ctx.lineTo(140,62); ctx.lineTo(230,240); ctx.lineTo(90,240); ctx.closePath(); ctx.fill();
  // 책장
  const SH_X=100, SH_W=760, PER=8, BW=82, BH=106;

  for(let r=0;r<2;r++){

      else {

        ctx.fillStyle=`hsl(${hue},55%,38%)`; ctx.fillRect(sx,sy,BW,26); ctx.fillRect(sx,sy,6,BH);

    }

  }

  ctx.fillStyle='#f5e9d0'; ctx.fillRect(W/2-ttw/2-12,20,ttw+24,24);
  ctx.fillStyle='#5c3f22'; ctx.fillText(ttl, W/2, 37);
  // 러그+테이블
  ctx.fillStyle='#c95561'; ctx.fillRect(330,430,300,170);
  ctx.fillStyle='#e2707a'; ctx.fillRect(342,442,276,146);
  ctx.fillStyle='#eb98a0'; ctx.fillRect(360,460,240,110);
  ctx.fillStyle='#c95561'; for(let i=0;i<12;i++){ ctx.fillRect(348+i*22,448,8,3); ctx.fillRect(348+i*22,580,8,3); }
  ctx.fillStyle='rgba(0,0,0,.25)'; ctx.beginPath(); ctx.ellipse(480,560,74,14,0,0,7); ctx.fill();
  ctx.fillStyle='#5e3a1e'; ctx.fillRect(420,548,14,22); ctx.fillRect(526,548,14,22);
  ctx.fillStyle='#7a4a26'; ctx.fillRect(408,478,144,76);
  ctx.fillStyle='#8f5c33'; ctx.fillRect(408,478,144,8);
  ctx.fillStyle='#5da03f'; ctx.fillRect(424,494,112,52);
  ctx.fillStyle='#4c8a33'; for(let i=0;i<4;i++){ ctx.fillRect(424+i*28,494,2,52); ctx.fillRect(424,494+i*14,112,2); }
  ctx.fillStyle='#f4d35e'; ctx.fillRect(434,504,12,12); ctx.fillStyle='#e05656'; ctx.fillRect(462,518,12,12); ctx.fillStyle='#3f9cde'; ctx.fillRect(496,500,12,12);
  ctx.fillStyle='#fff'; ctx.fillRect(514,524,11,11); ctx.fillStyle='#222';
  [[517,527],[521,531],[517,531],[521,527],[519,529]].forEach(([px,py])=>ctx.fillRect(px,py,2,2));
  // 출구 매트
  ctx.fillStyle='#a83c3c'; ctx.fillRect(432,636,96,48);
  ctx.fillStyle='#c94f4f'; ctx.fillRect(438,642,84,36);
  ctx.fillStyle='#fff'; ctx.font='bold 13px Pretendard,sans-serif'; ctx.fillText('나가기 ⬇', 480, 664);
}

// ── 충돌/루프 ──
function isSolid(x,y){
  const tx=Math.floor(x/TILE), ty=Math.floor(y/TILE);
  if(tx<0||ty<0||tx>=COLS||ty>=ROWS) return true;
  if(scene==='village') return solid[ty][tx];
  if(scene==='home'){ if(ty<13) return true; if(x>396&&x<564&&y>466&&y<566) return true; return false; }
  return false;
}
let last=performance.now();
function loop(now){
  const dt=Math.min(50, now-last)/1000; last=now;
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a']) dx=-1; if(keys['ArrowRight']||keys['d']) dx=1;
  if(keys['ArrowUp']||keys['w']) dy=-1; if(keys['ArrowDown']||keys['s']) dy=1;
  player.moving=!!(dx||dy);
  if(dx||dy){
    const sp=150*dt, nx=player.x+dx*sp, ny=player.y+dy*sp;
    if(!isSolid(nx-8,player.y)&&!isSolid(nx+8,player.y)) player.x=nx;
    if(!isSolid(player.x,ny-4)&&!isSolid(player.x,ny+8)) player.y=ny;
    player.dir=dy<0?'up':dy>0?'down':dx<0?'left':'right';
    player.ft+=dt; if(player.ft>0.13){ player.ft=0; player.frame=(player.frame+1)%4; }
  } else player.frame=0;
  player.x=Math.max(10,Math.min(W-10,player.x)); player.y=Math.max(20,Math.min(H-6,player.y));
  if(scene==='village') coins.forEach(cn=>{ if(!cn.got && Math.hypot(cn.x*TILE+16-player.x, cn.y*TILE+16-player.y)<20){ cn.got=true; points+=10; saveCoins(); say('+10 포인트! 🪙',900); } });
  // NPC (공원 산책)
  npc.t-=dt;
  if(npc.t<=0){ npc.t=2+Math.random()*3; npc.tx=(17+Math.random()*5)*TILE; npc.ty=(11.2+Math.random()*2)*TILE; }
  const cdx=npc.tx-npc.x, cdy=npc.ty-npc.y;
  if(Math.hypot(cdx,cdy)>3){ npc.x+=cdx*dt*0.8; npc.y+=cdy*dt*0.8;
    npc.dir=Math.abs(cdx)>Math.abs(cdy)?(cdx<0?'left':'right'):(cdy<0?'up':'down');
    npc.frame+=dt*7; } else npc.frame=0;

  ctx.clearRect(0,0,W,H);
  if(scene==='village') drawVillageDyn(now,dt); else drawHome(now);
  const myImg=IMGS['char_'+(me?me.char:'Boy')]||IMGS['char_Boy'];
  drawActor(ctx,myImg,player.x,player.y,player.dir,player.moving?player.frame:0,2.2);
  if(me){ ctx.fillStyle='rgba(0,0,0,.5)'; ctx.font='bold 11px Pretendard,sans-serif'; ctx.textAlign='center';
    const tw=ctx.measureText(me.name).width; ctx.fillRect(player.x-tw/2-6,player.y-56,tw+12,16);
    ctx.fillStyle='#fff'; ctx.fillText(me.name,player.x,player.y-44); }
  if(bubble && now<bubble.until){
    ctx.font='bold 13px Pretendard,sans-serif'; const tw=ctx.measureText(bubble.text).width;
    const bx=Math.max(10,Math.min(W-tw-30,player.x-tw/2-10)), by=player.y-90;
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.roundRect(bx,by,tw+20,26,8); ctx.fill();
    ctx.beginPath(); ctx.moveTo(player.x-5,by+26); ctx.lineTo(player.x+5,by+26); ctx.lineTo(player.x,by+33); ctx.fill();
    ctx.fillStyle='#222'; ctx.textAlign='left'; ctx.fillText(bubble.text,bx+10,by+18);
  }
  const p=nearPrompt(); const hint=document.getElementById('hint');
  if(p){ hint.style.display='block'; hint.textContent='E — '+(p.label||p.action); } else hint.style.display='none';
  requestAnimationFrame(loop);
}

// ── 초기화 ──
function init(){
  document.getElementById('loading').style.display='none';
  bakeVillage();
  const grid=document.getElementById('charGrid');
  CHARS.forEach((ch,i)=>{
    const btn=document.createElement('div'); btn.className='cbtn'+(i===0?' sel':'');
    const cc=document.createElement('canvas'); cc.width=48; cc.height=52;
    btn.appendChild(cc); grid.appendChild(btn);
    const g=cc.getContext('2d'); g.imageSmoothingEnabled=false;
    const img=IMGS['char_'+ch]; if(img) g.drawImage(img,0,0,img.width/4,img.height/4,8,10,32,32*(img.height/img.width));
    btn.onclick=()=>{ grid.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('sel')); btn.classList.add('sel'); charSel=i; };
  });
  document.getElementById('go').onclick=()=>{
    me={ name:(document.getElementById('nm').value||'여행자').slice(0,8), char:CHARS[charSel] };
    store.set('me',me); document.getElementById('creator').style.display='none';
  };
  if(!me) document.getElementById('creator').style.display='flex';
  requestAnimationFrame(loop);
}
// 디버그/테스트용 핸들 (프로토타입)
window.__v={ player, keys, doAction, get scene(){return scene}, set scene(s){scene=s}, get points(){return points} };
</script>
