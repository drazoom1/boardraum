<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>보드마을 · 공사중</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }
  body {
    font-family:'Pretendard','Apple SD Gothic Neo',-apple-system,BlinkMacSystemFont,sans-serif;
    background:linear-gradient(160deg,#eaf6f4 0%,#d7ecf5 100%);
    color:#2b3a44;
    display:flex; align-items:center; justify-content:center;
    min-height:100dvh; padding:24px; text-align:center;
    -webkit-font-smoothing:antialiased;
  }
  .card {
    max-width:420px; width:100%;
    background:#fff; border-radius:28px;
    box-shadow:0 18px 50px rgba(60,110,130,.18);
    padding:44px 30px 36px;
  }
  .emoji { font-size:64px; line-height:1; margin-bottom:18px; animation:bob 2.4s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  h1 { font-size:23px; font-weight:800; letter-spacing:-.02em; margin-bottom:10px; }
  p { font-size:15px; line-height:1.6; color:#5c6f7a; margin-bottom:6px; }
  .sub { font-size:13px; color:#8fa2ac; margin-top:14px; }
  .bar { height:8px; border-radius:99px; background:#e5eef1; overflow:hidden; margin:26px 0 8px; }
  .bar > i { display:block; height:100%; width:45%; border-radius:99px;
    background:linear-gradient(90deg,#57c4b4,#3fa9d8); animation:load 2.2s ease-in-out infinite; }
  @keyframes load { 0%{margin-left:-45%} 100%{margin-left:100%} }
  .btn {
    display:inline-block; margin-top:26px;
    background:#111; color:#fff; text-decoration:none;
    font-size:15px; font-weight:700;
    padding:13px 26px; border-radius:14px;
    transition:transform .1s ease, background .15s ease;
  }
  .btn:active { transform:scale(.96); }
</style>
</head>
<body>
  <div class="card">
    <div class="emoji">🚧🏡</div>
    <h1>보드마을은 공사중이에요</h1>
    <p>더 즐거운 마을로 단장하고 있어요.<br>조금만 기다려 주세요!</p>
    <div class="bar"><i></i></div>
    <p class="sub">곧 다시 열립니다 ✨</p>
    <a class="btn" href="/">← 보드라움으로 돌아가기</a>
  </div>
</body>
</html>
