const DIRO={right:0,up:6,left:12,down:18};          // 달걀 (16x32 스트립)
const SLDIR={down:0,up:1,left:2,right:3};            // 스프라우트 (48x48, 행=방향)
function drawChar(key,X,Y,dir,moving,t){
  const img=IMGS[key]; if(!img) return;
  ctx.fillStyle='rgba(0,0,0,.22)'; ctx.beginPath(); ctx.ellipse(X,Y+1,12,3.8,0,0,7); ctx.fill();

}

// ═══════════ 유틸 ═══════════
const rng=(x,y)=>{ let h=(x*374761393+y*668265263)^(x*y*1274126177); h=(h^(h>>13))*1103515245; return (h^(h>>16))>>>0; };
function newGrid(cols,rows,v){ const g=[]; for(let y=0;y<rows;y++){ g[y]=[]; for(let x=0;x<cols;x++) g[y][x]=v; } return g; }
const setRect=(arr,x,y,w,h,v)=>{ for(let j=y;j<y+h;j++) for(let i=x;i<x+w;i++){ if(arr[j]&&arr[j][i]!==undefined) arr[j][i]=v; } };
function T(c,img,tx,ty,X,Y){ if(img) c.drawImage(img,tx*16,ty*16,16,16,X,Y,TILE,TILE); }
function soilPiece(map,cols,rows,x,y){
  const is=(dx,dy)=>{ const ty=y+dy,tx=x+dx; return ty>=0&&ty<rows&&tx>=0&&tx<cols&&map[ty][tx]===1; };
  const n=is(0,-1),s=is(0,1),e=is(1,0),w=is(-1,0);
  if(!n&&!s&&!e&&!w) return [3,3];
  if(!e&&!w) return [3, !n?0:(!s?2:1)];
  if(!n&&!s) return [!w?0:(!e?2:1), 3];
  return [!w?0:(!e?2:1), !n?0:(!s?2:1)];
}
// 섬 마스크: 모서리 둥근 섬 + 출구 corridors(육지 다리)
function makeIsland(cols,rows,exits){
  const m=newGrid(cols,rows,false);
  const mar=1, rad=3;
  const Lb=mar, Rb=cols-1-mar, Tb=mar, Bb=rows-1-mar;
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++){
    if(x<Lb||x>Rb||y<Tb||y>Bb) continue;
    const dx=Math.max(0,(Lb+rad)-x, x-(Rb-rad));
    const dy=Math.max(0,(Tb+rad)-y, y-(Bb-rad));
    if(dx*dx+dy*dy<=rad*rad+rad) m[y][x]=true;
  }
  (exits||[]).forEach(ex=>{
    for(let x=ex.x1;x<=ex.x2;x++){
      if(ex.side==='bottom'){ for(let y=Bb-rad;y<rows;y++) m[y][x]=true; }
      else { for(let y=0;y<=Tb+rad;y++) m[y][x]=true; }
    }
  });
  return m;
}
function bakeGround(c,map,cols,rows,island){
  const isl=(x,y)=>!island || (y>=0&&y<rows&&x>=0&&x<cols&&island[y][x]);
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++){
    if(island && !island[y][x]) continue; // 물 (dyn에서 애니)
    const r=rng(x,y);
    if(!island){ T(c,IMGS.grass,0,0,x*TILE,y*TILE); }
    else {
      const n=isl(x,y-1),s=isl(x,y+1),e=isl(x+1,y),w=isl(x-1,y);
      if(n&&s&&e&&w) T(c,IMGS.grass,0,0,x*TILE,y*TILE);
      else {
        let ci,ri;
        if(!e&&!w){ ci=3; ri=!n?0:(!s?2:1); }
        else if(!n&&!s){ ci=!w?0:(!e?2:1); ri=3; }
        else { ci=!w?0:(!e?2:1); ri=!n?0:(!s?2:1); }
        T(c,IMGS.grass,0,0,x*TILE,y*TILE); // 밑색
        T(c,IMGS.grassauto,ci,ri,x*TILE,y*TILE);
      }
    }
    const interior=!island || (isl(x,y-1)&&isl(x,y+1)&&isl(x+1,y)&&isl(x-1,y));
    if(map[y][x]===0 && interior){
      if(r%6===0) T(c,IMGS['gdec'+(1+r%6)],0,0,x*TILE,y*TILE);
      else if(r%31===0) T(c,IMGS['flower'+(1+r%4)],0,0,x*TILE,y*TILE);
      else if(r%53===0) T(c,IMGS['mush'+(1+r%3)],0,0,x*TILE,y*TILE);
    }
  }
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++) if(map[y][x]===1){
    const [ci,ri]=soilPiece(map,cols,rows,x,y);
    T(c,IMGS.soilauto,ci,ri,x*TILE,y*TILE);
  }
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++) if(map[y][x]===2){
    const is=(dx,dy)=>{ const ty=y+dy,tx=x+dx; return ty>=0&&ty<rows&&tx>=0&&tx<cols&&map[ty][tx]===2; };
    const n=is(0,-1),s=is(0,1),e=is(1,0),w=is(-1,0);
    const ci=!w?0:(!e?2:1), ri=!n?0:(!s?2:1);
    T(c,IMGS.soilauto,ci,ri,x*TILE,y*TILE);
  }
}
function drawSprites(c,sp){

    c.drawImage(img, s.px, s.py, img.width*2, img.height*2); });
}

}

function fetchCover(id){

const player={ x:14.5*TILE+16, y:8*TILE, dir:'down', moving:false };
const keys={};
const typing=e=>e.target&&['INPUT','TEXTAREA'].includes(e.target.tagName);
const modalOpen=()=>['colModal','newsModal','creator'].some(id=>document.getElementById(id).style.display==='flex');
addEventListener('keydown',e=>{ if(typing(e)) return;
  if(modalOpen()){ if(e.key==='Escape'){ ['colModal','newsModal'].forEach(id=>document.getElementById(id).style.display='none'); } return; }
  keys[e.key]=true; if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault(); if(e.key==='e'||e.key==='E'||e.key==='Enter') doAction(); });
addEventListener('keyup',e=>{ if(typing(e)) return; keys[e.key]=false; });
addEventListener('blur',()=>{ for(const k in keys) keys[k]=false; });
document.querySelectorAll('#dpad button').forEach(b=>{ const k=b.dataset.k;
  b.addEventListener('touchstart',e=>{e.preventDefault();keys[k]=true;},{passive:false});
  b.addEventListener('touchend',e=>{e.preventDefault();keys[k]=false;},{passive:false}); });
document.getElementById('btnE').addEventListener('touchstart',e=>{e.preventDefault();doAction();},{passive:false});

let bubble=null;
function sayAt(x,y,t,ms=3400){ bubble={x,y,text:t, until:performance.now()+ms}; }
function say(t,ms=2600){ sayAt(player.x,player.y-88,t,ms); }

let coins=[];
function loadCoins(){
  const s=SC[scene]; if(!s||!s.coins){ coins=[]; return; }
  coins=store.get(s.coins, s.coinPos.map(([x,y])=>({x,y,got:false})));
}
function saveCoins(){ const s=SC[scene]; if(s&&s.coins) store.set(s.coins,coins); store.set('points',points); document.getElementById('pts').textContent=points; }

function switchScene(name, px, py, dir){
  scene=name; player.x=px; player.y=py; player.dir=dir||'down'; bubble=null;
  document.getElementById('loc').textContent = SC[name].loc;
  loadCoins();
}

function nearPrompt(){
  const s=SC[scene]; if(!s) return null;
  for(const it of s.interact){ if(Math.hypot(player.x-it.x, player.y-it.y)<it.r) return it; }
  for(const n of s.npcs){ if(Math.hypot(player.x-n.x, player.y-n.y)<52) return {label:n.name+'와 대화',act:'talk',npc:n}; }
  return null;
}
function doAction(){
  if(modalOpen()) return;
  const p=nearPrompt(); if(!p) return;
  if(p.act==='festa'){ switchScene('festa',22*TILE,23*TILE,'up'); say('🎪 보드게임 페스타에 오신 걸 환영해요!'); }
  else if(p.act==='exitFesta'){ switchScene('road',15*TILE,8.8*TILE,'down'); }
  else if(p.act==='board'){ openBoard(); }
  else if(p.act==='booth'){ festaReturn={x:p.x, y:p.y+20}; boothCo=p.co; buildBooth(p.co); switchScene('booth',15*TILE,16*TILE,'up'); }
  else if(p.act==='exitBooth'){ switchScene('festa',festaReturn.x,festaReturn.y,'down'); }
  else if(p.act==='collection'){ openCollection(); }
  else if(p.act==='news'){ openNews(p.co); }
  else if(p.act==='bubble'){ say(p.text); }
  else if(p.act==='talk'){ const n=p.npc; n.li=(n.li||0);
    const oy = n.img&&n.img.startsWith('slc_') ? 92 : 70;
    sayAt(n.x, n.y-oy, n.lines[n.li%n.lines.length]); n.li++; }
}

// ── 동적 요소 ──
const butterflies=[{x:320,y:230,p:0},{x:660,y:480,p:2}];
function drawSceneDyn(t,dt){
  const s=SC[scene];
  // 섬 씬: 바다(애니 물)를 먼저 깔고 그 위에 섬 베이크
  if(s.island){
    const wf=IMGS.wframes;
    if(wf){ const fr=Math.floor(t/380)%4;
      for(let y=0;y<s.rows;y++) for(let x=0;x<s.cols;x++){
        if(!s.island[y][x]) ctx.drawImage(wf,fr*16,0,16,16,x*TILE,y*TILE,TILE,TILE);
      }
    } else { ctx.fillStyle='#79c2c2'; ctx.fillRect(0,0,s.w,s.h); }
  }
  ctx.drawImage(s.bake,0,0);
  // 연못 물 (애니 4프레임)
  if(s.pond){
    const wf=IMGS.wframes;
    if(wf){ const fr=Math.floor(t/350)%4;
      for(let y=s.pond.y+1;y<s.pond.y+s.pond.h-1;y++) for(let x=s.pond.x+1;x<s.pond.x+s.pond.w-1;x++){
        ctx.drawImage(wf,fr*16,0,16,16,x*TILE,y*TILE,TILE,TILE);
      }
      const bob=Math.sin(t/800)*2;
      const bt2=IMGS.boat; if(bt2) ctx.drawImage(bt2,(s.pond.x+1.6)*TILE,(s.pond.y+1.4)*TILE+bob,bt2.width*2,bt2.height*2);
    }
  }
  // 코인
  coins.forEach(cn=>{ if(cn.got) return; const X=cn.x*TILE+16, Y=cn.y*TILE+14+Math.sin(t/300+cn.x)*3;
    ctx.fillStyle='rgba(0,0,0,.2)'; ctx.beginPath(); ctx.ellipse(X,cn.y*TILE+27,6,2,0,0,7); ctx.fill();
    if(IMGS.coin) ctx.drawImage(IMGS.coin,X-7,Y-7,14,14); });
  // 동물
  (s.animals||[]).forEach(a=>{
    if(a.type==='chicken'){
      const img=IMGS.chicken; if(!img) return;
      const fr=Math.floor(a.fr)%(a.movingRow?4:2); // idle행은 2프레임뿐
      ctx.save();
      if(a.flip){ ctx.translate(a.x*2,0); ctx.scale(-1,1); }
      ctx.drawImage(img,fr*16,a.movingRow?16:0,16,16, a.x-16, a.y-28, 32,32);
      ctx.restore();
    } else {
      const img=IMGS.cowrow; if(!img) return; // 걷기 8프레임 행
      const fr=a.movingRow?Math.floor(a.fr)%8:0;
      ctx.save();
      if(a.flip){ ctx.translate(a.x*2,0); ctx.scale(-1,1); }
      ctx.drawImage(img,fr*32,0,32,32, a.x-32, a.y-56, 64,64);
      ctx.restore();
    }
  });
  // NPC
  s.npcs.forEach(n=>{
    drawChar(n.img,n.x,n.y,n.dir||'down',false,t+(n.x*7));
    if(!n.hideTag){
      const oy = n.img.startsWith('slc_') ? 62 : 76;
      ctx.font='bold 10px Pretendard,sans-serif'; ctx.textAlign='center';
      const tw=ctx.measureText(n.name).width;
      ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(n.x-tw/2-5,n.y-oy-11,tw+10,14);
      ctx.fillStyle='#ffe9a8'; ctx.fillText(n.name,n.x,n.y-oy);
    }
  });
  if(scene==='camp'||scene==='road'){
    butterflies.forEach(bf=>{ bf.p+=dt;
      const bx=bf.x+Math.sin(bf.p*0.7)*60+Math.sin(bf.p*2.3)*14, by=bf.y+Math.cos(bf.p*0.9)*40;
      const wing=Math.sin(bf.p*18)*3;
      ctx.fillStyle='#fff'; ctx.fillRect(bx-3-wing,by-2,3+wing,4); ctx.fillRect(bx+1,by-2,3+wing,4);
      ctx.fillStyle='#f4d35e'; ctx.fillRect(bx-2-wing,by-1,2,2); ctx.fillRect(bx+2,by-1,2,2);
      ctx.fillStyle='#2b2019'; ctx.fillRect(bx-0.5,by-2.5,1.5,5); });
    const cs=(t/40)%1400-200;
    ctx.fillStyle='rgba(25,50,30,.10)';
    ctx.beginPath(); ctx.ellipse(cs,180,130,45,0,0,7); ctx.ellipse(cs+90,210,90,35,0,0,7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(1100-cs*0.7,520,110,40,0,0,7); ctx.fill();
  }
}

// ── 충돌/루프 ──
function isSolid(x,y){
  const s=SC[scene];
  const tx=Math.floor(x/TILE), ty=Math.floor(y/TILE);
  if(tx<0||ty<0||tx>=s.cols||ty>=s.rows) return false;
  return s.solid[ty][tx];
}
let last=performance.now();
function loop(now){
  const dt=Math.min(50, now-last)/1000; last=now;
  let dx=0,dy=0;
  if(!modalOpen()){
    if(keys['ArrowLeft']||keys['a']) dx=-1; if(keys['ArrowRight']||keys['d']) dx=1;
    if(keys['ArrowUp']||keys['w']) dy=-1; if(keys['ArrowDown']||keys['s']) dy=1;
  }
  player.moving=!!(dx||dy);
  if(dx||dy){
    const sp=155*dt, nx=player.x+dx*sp, ny=player.y+dy*sp;
    if(!isSolid(nx-8,player.y)&&!isSolid(nx+8,player.y)) player.x=nx;
    if(!isSolid(player.x,ny-4)&&!isSolid(player.x,ny+8)) player.y=ny;
    player.dir=dy<0?'up':dy>0?'down':dx<0?'left':'right';
  }
  const sw=SC[scene].w, sh=SC[scene].h;
  if(scene==='camp' && player.y>sh-14 && player.x>13*TILE && player.x<17*TILE){ switchScene('road',27*TILE,1.6*TILE,'down'); }
  else if(scene==='road' && player.y<10 && player.x>25*TILE && player.x<29*TILE){ switchScene('camp',15*TILE,(SC.camp.rows-1.4)*TILE,'up'); }
  player.x=Math.max(12,Math.min(sw-12,player.x)); player.y=Math.max(2,Math.min(sh-4,player.y));
  coins.forEach(cn=>{ if(!cn.got && Math.hypot(cn.x*TILE+16-player.x, cn.y*TILE+16-player.y)<20){ cn.got=true; points+=10; saveCoins(); say('+10 포인트! 🪙',900); } });
  // 동물 배회
  const s0=SC[scene];
  if(s0&&s0.animals&&s0.animals.length){
    s0.animals.forEach(a=>{
      a.t-=dt;
      if(a.t<=0){ a.t=2+Math.random()*4;
        const z=s0.animalZone;
        a.tx=z.x1+Math.random()*(z.x2-z.x1); a.ty=z.y1+Math.random()*(z.y2-z.y1); }
      const ddx=a.tx-a.x, ddy=a.ty-a.y;
      if(Math.hypot(ddx,ddy)>4){ a.x+=ddx*dt*0.5; a.y+=ddy*dt*0.5;
        a.flip=ddx<0; a.movingRow=true; a.fr+=dt*6; }
      else { a.movingRow=false; a.fr+=dt*2.5; }
    });
  }
  cam.x=Math.max(0,Math.min(sw-VW, player.x-VW/2));
  cam.y=Math.max(0,Math.min(sh-VH, player.y-VH/2));

  ctx.clearRect(0,0,VW,VH);
  ctx.save(); ctx.translate(-cam.x,-cam.y);
  drawSceneDyn(now,dt);
  const myKey=me?me.char:'slc_cream';
  drawChar(myKey,player.x,player.y,player.dir,player.moving,now);
  if(me){ const ty=myKey.startsWith('slc_')?66:88;
    ctx.fillStyle='rgba(0,0,0,.5)'; ctx.font='bold 11px Pretendard,sans-serif'; ctx.textAlign='center';
    const tw=ctx.measureText(me.name).width; ctx.fillRect(player.x-tw/2-6,player.y-ty-12,tw+12,16);
    ctx.fillStyle='#fff'; ctx.fillText(me.name,player.x,player.y-ty); }
  if(bubble && now<bubble.until){
    ctx.font='bold 13px Pretendard,sans-serif';
    const tw=Math.min(ctx.measureText(bubble.text).width, 430);
    const bx=Math.max(cam.x+10,Math.min(cam.x+VW-tw-30,bubble.x-tw/2-10)), by=bubble.y-26;
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.roundRect(bx,by,tw+20,26,8); ctx.fill();
    ctx.beginPath(); ctx.moveTo(bubble.x-5,by+26); ctx.lineTo(bubble.x+5,by+26); ctx.lineTo(bubble.x,by+33); ctx.fill();
    ctx.fillStyle='#222'; ctx.textAlign='left'; ctx.fillText(bubble.text,bx+10,by+18,430);
  }
  ctx.restore();
  const p=modalOpen()?null:nearPrompt(); const hint=document.getElementById('hint');
  if(p){ hint.style.display='block'; hint.textContent='E — '+p.label; } else hint.style.display='none';
  requestAnimationFrame(loop);
}

    lb.style.cssText='font-size:10px;font-weight:800;color:#b8860b;padding-bottom:2px'; lb.textContent=labelText; btn.appendChild(lb); }

  charPreview(g,key);
  btn.onclick=()=>{ grid.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('sel')); btn.classList.add('sel'); charSel=key; };

function addRankCell(){
  if(!myRank) return;
  const grid=document.getElementById('charGrid');
  if(grid.querySelector('[data-key^="eg_"]')) return;
  const btn=makeCharCell(grid,myRank.key,'🏆 '+myRank.label);
  btn.style.borderColor='#e0b23a'; btn.style.background='#fffbe8';
  grid.prepend(btn);
  if(me && me.char===myRank.key){ grid.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('sel')); btn.classList.add('sel'); }
}
function openCreator(){
  const c=document.getElementById('creator');
  document.getElementById('nm').value=me?me.name:'여행자';
  charSel=me?me.char:'slc_cream';
  c.querySelectorAll('.cbtn').forEach(b=>b.classList.toggle('sel',b.dataset.key===charSel));
  if(!c.querySelector('.sel')){ const f=c.querySelector('.cbtn'); if(f){ f.classList.add('sel'); charSel=f.dataset.key; } }
  c.style.display='flex';
}
function init(){
  document.getElementById('loading').style.display='none';
  buildCamp(); buildRoad(); buildFesta();
  loadCoins();
  const grid=document.getElementById('charGrid');
  SLC.forEach(cn=>makeCharCell(grid,'slc_'+cn));
  grid.querySelector('.cbtn').classList.add('sel');
  document.getElementById('go').onclick=()=>{
    me={ name:(document.getElementById('nm').value||'여행자').slice(0,8), char:charSel };
    store.set('me',me); document.getElementById('creator').style.display='none';
  };
  fetchMyRank();
  if(!me) openCreator();
  requestAnimationFrame(loop);
}
// 디버그/테스트용 핸들 (프로토타입)
window.__v={ player, keys, doAction, switchScene, get scene(){return scene}, get points(){return points}, get cam(){return cam} };
</script>
